：约七个月后，再看顶级做市商 Hudson River Trading（HRT）如何把 AI 真正嵌入交易与研发流程。", "标题的 token burn 直指要害——HRT 员工在大模型推理上的 token 消耗已成为一项可观且高速增长的真实开支。", "内存价格成为关键变量：嘉宾 Iain Dunning 把内存（memory）成本单列出来谈，说明它正成为 AI 算力账单里的硬约束。", "算力瓶颈不止是 GPU：与同期 CoreWeave、Jane Street 新建数据中心的叙事呼应，电力、内存与芯片供给同时紧张。", "自研芯片的冲动：HRT 这类对延迟与成本极度敏感的机构，正认真考虑自研芯片以摆脱外部算力的价格与供给约束。", "AI-induced delirium（AI 诱发的幻觉/错乱）被点名：在高强度使用大模型的交易场景里，模型一本正经地编造会带来真实风险，需要刻意防范。", "把 AI 成本落到 P&L：当连量化做市商都开始按 token 计成本、考虑自研芯片，说明 AI 推理开销已经从研发预算渗进了日常经营账本。", "Jane Street 计划新建数据中心、英伟达投资的机器人创业公司 Generalist AI 估值约20亿美元等同期事实，共同勾勒出算力稀缺的大背景。"], "takeaways": ["评估 AI 的真实成本，别只看模型订阅费——token 推理开销会随使用强度指数级放大，要按用量建模。", "对成本/延迟极度敏感的机构最终会倾向垂直整合（自研芯片、自建数据中心），这是判断算力周期的重要信号。", "越是重度依赖大模型，越要为幻觉建立校验机制：让模型可核查、可追溯，而不是盲信其输出。"], "quotes": ["How much HRT employees are actually spending on tokens, and why the firm might develop its own chips. —— HRT 员工到底在 token 上花了多少、以及这家公司为何可能自研芯片。（本期主线）", "The price of memory, bottlenecks in compute... as well as AI-induced delirium. —— 内存的价格、算力的瓶颈……以及 AI 诱发的认知错乱。（Iain Dunning，HRT）"], "data": ["嘉宾：Hudson River Trading AI 主管 Iain Dunning；本期为约七个月前对谈的回访。", "核心账目：员工大模型 token 消耗成为可观且快速增长的开支。", "硬约束：内存价格、算力供给被单列为瓶颈。", "同期背景：Jane Street 计划新建数据中心；英伟达投资的 Generalist AI 估值约20亿美元。", "节目时长约31分钟。"], "detail": "如果说市场上关于 AI 算力的讨论大多停留在超大规模厂商（hyperscaler）与模型公司层面，这期 Odd Lots 提供了一个稀缺得多的视角：一家顶级量化做市商 Hudson River Trading（HRT）的 AI 账本到底长什么样。主持人回访了 HRT 的 AI 主管 Iain Dunning——去年聊过这家公司怎么用 AI，约七个月后再来看，重点已经从“用不用”变成“用得有多猛、花得有多狠”。\n\n标题里的 token burn 不是修辞。Dunning 谈到 HRT 员工在大模型推理上的 token 消耗已是一项可观且高速增长的真实开支，把 AI 从研发预算项推进了日常经营的损益表。围绕这条账，他把几个硬约束摊开讲：内存（memory）价格被单列出来强调，说明它正成为 AI 算力账单中越来越关键的成本变量；算力瓶颈也不止 GPU，而是 GPU、内存与电力同时紧张——这与同期 CoreWeave 谈芯片/变压器/电力稀缺、Jane Street 计划新建数据中心的叙事彼此印证。\n\n顺着成本与供给的逻辑，HRT 这类对延迟与单位成本极度敏感的机构，自然产生了自研芯片的冲动。对它们而言，外部算力的价格波动与供给不确定本身就是交易风险，垂直整合（自研芯片、甚至自建算力）是控成本、控延迟的合理演化方向。这也是观察整个算力周期的重要信号：当连量化做市商都开始认真盘算自研芯片，说明算力稀缺已经深入到金融基础设施层。\n\n本期还点名了一个容易被忽视但很现实的风险——AI-induced delirium，即在高强度使用大模型时，模型一本正经地编造（hallucination）会带来真实损失，需要刻意建立校验与追溯机制。对一个想认真理解 AI 经济学的年轻人来说，这期的价值在于把宏大的算力叙事落到一家具体公司的具体账目上：token 怎么烧、内存怎么贵、为什么要自研芯片、怎么防幻觉。具体、第一手、可迁移，因此评为⭐4。", "tldr_en": "Following last year's conversation about how HRT uses AI, this episode revisits its Head of AI, Iain Dunning, to discuss a top quant market maker's real spending on AI: just how many tokens employees burn through, why memory and compute have become bottlenecks, why the firm might build its own chips, and the cognitive hallucination risks AI brings.", "detail_en": "If most market discussion about AI compute stays at the level of hyperscalers and model companies, this episode of Odd Lots offers a much rarer perspective: what the AI ledger of a top quant market maker, Hudson River Trading (HRT), actually looks like. The hosts revisit HRT's Head of AI, Iain Dunning—they talked about how this firm uses AI last year, and now, about seven months later, the focus has shifted from \"whether to use it\" to \"how aggressively it's used and how heavily money is spent.\"\n\nThe \"token burn\" in the title is no figure of speech. Dunning notes that HRT employees' token consumption on large-model inference is already a substantial and fast-growing real expense, pushing AI from an R&D budget item into the day-to-day operating P&L. Around this ledger, he lays out several hard constraints: memory is singled out and emphasized for its price, showing it is becoming an increasingly critical cost variable in the AI compute bill; the compute bottleneck is also not just GPUs, but GPUs, memory, and power being tight all at once—which corroborates the contemporaneous narratives of CoreWeave discussing scarcity of chips/transformers/power and Jane Street planning to build new data centers.\n\nFollowing the logic of cost and supply, an institution like HRT, extremely sensitive to latency and unit cost, naturally develops the impulse to build its own chips. For them, the price volatility and supply uncertainty of external compute are themselves trading risks, and vertical integration (building their own chips, even their own compute) is a reasonable evolutionary direction for controlling cost and latency. This is also an important signal for observing the entire compute cycle: when even a quant market maker starts seriously considering building its own chips, it shows that compute scarcity has penetrated deep into the financial-infrastructure layer.\n\nThis episode also names an easily overlooked but very real risk—AI-induced delirium, i.e., during intensive use of large models, the model confidently fabricating (hallucinating) can cause real losses, requiring deliberately built verification and traceability mechanisms. For a young person who wants to seriously understand the economics of AI, the value of this episode lies in grounding the grand compute narrative in one specific company's specific ledger: how tokens are burned, why memory is expensive, why build your own chips, how to guard against hallucination. Concrete, first-hand, transferable, hence rated 4 stars.", "worthReason_en": "Rarely pulls the economics of AI compute into a top market maker's ledger: employee token spending, memory prices, the impulse to build proprietary chips—first-hand and concrete.", "guest_en": "Iain Dunning (Head of AI at Hudson River Trading)", "points_en": ["This is a revisit of last year's episode: about seven months later, looking again at how top market maker Hudson River Trading (HRT) genuinely embeds AI into its trading and R&D workflows.", "The title's \"token burn\" goes straight to the point—HRT employees' token consumption on large-model inference has become a substantial and fast-growing real expense.", "Memory price becomes a key variable: guest Iain Dunning singles out memory cost for discussion, showing it is becoming a hard constraint in the AI compute bill.", "The compute bottleneck is more than GPUs: echoing the contemporaneous narratives of CoreWeave and Jane Street building new data centers, power, memory, and chip supply are tight all at once.", "The impulse to build proprietary chips: institutions like HRT, extremely sensitive to latency and cost, are seriously considering building their own chips to escape the price and supply constraints of external compute.", "AI-induced delirium is named: in trading scenarios with intensive large-model use, the model confidently fabricating brings real risk and needs to be deliberately guarded against.", "Bringing AI cost into the P&L: when even a quant market maker starts costing things by the token and considering proprietary chips, it shows AI inference spending has seeped from the R&D budget into the day-to-day operating ledger.", "Contemporaneous facts—Jane Street planning to build new data centers, and the Nvidia-backed robotics startup Generalist AI valued at about $2 billion—together sketch out the broader backdrop of compute scarcity."], "takeaways_en": ["To assess the real cost of AI, don't just look at model subscription fees—token inference spending scales exponentially with usage intensity, so model it by volume.", "Institutions extremely sensitive to cost/latency will ultimately tend toward vertical integration (proprietary chips, self-built data centers), an important signal for judging the compute cycle.", "The more heavily you rely on large models, the more you must build verification mechanisms for hallucination: make the model checkable and traceable, rather than blindly trusting its output."], "quotes_en": ["How much HRT employees are actually spending on tokens, and why the firm might develop its own chips. (the episode's through-line)", "The price of memory, bottlenecks in compute... as well as AI-induced delirium. (Iain Dunning, HRT)"], "data_en": ["Guest: Iain Dunning, Head of AI at Hudson River Trading; this episode is a revisit of a conversation about seven months earlier.", "Core ledger item: employee large-model token consumption has become a substantial and fast-growing expense.", "Hard constraints: memory price and compute supply are singled out as bottlenecks.", "Contemporaneous backdrop: Jane Street plans to build new data centers; the Nvidia-backed Generalist AI is valued at about $2 billion.", "Episode length about 31 minutes."], "note": ""}, {"id": "2026-06-16-mfm-lloyd-blankfein", "podcast": "My First Million", "tier": "A", "category": "财经/投资", "title": "How the Ex-Goldman CEO actually invests his own money", "guest": "Lloyd Blankfein（高盛 Goldman Sachs 前董事长兼 CEO）", "host": "Sam Parr", "date": "2026-06-16", "durationMin": 47, "worthScore": 4, "worthReason": "罕见地让前高盛 CEO 谈自己怎么投钱、最差交易者的通病与巴菲特握手协议，嘉宾稀缺性与行为金融含量都很高。", "originalUrl": "https://www.mfmpod.com/how-the-ex-goldman-ceo-actually-invests-his-own-money/", "transcriptUrl": "https://www.mfmpod.com/how-the-ex-goldman-ceo-actually-invests-his-own-money/", "noteFile": "", "status": "done", "tldr": "Sam Parr 对谈高盛前董事长兼 CEO Lloyd Blankfein，聊他个人到底怎么打理自己的钱：投资组合构成、对年轻投资者的建议、最差交易者的共性、与巴菲特的握手协议，以及把焦虑当成超能力的处世哲学。", "points": ["嘉宾稀缺性极高：Lloyd Blankfein 曾长期掌舵高盛（董事长兼 CEO），从交易员一路做到顶端，本期谈的是他个人如何投自己的钱，而非公司层面的官方说法。", "最差交易者的共性（5:23）：Blankfein 总结糟糕交易者的通病——通常输在情绪、纪律与风险管理，而非智力，这与他多年观察交易台的经验一致。", "巴菲特的握手协议（9:54）：节目复盘了 Blankfein 与 Warren Buffett 之间那笔以信任与口头承诺为基础的交易，凸显声誉资本在大宗交易中的分量。", "Blankfein 拆解自己的投资组合（15:04）：以一个深谙市场的人的身份，讲他个人资产如何配置，给出贴近实操的资产组合视角。", "对年轻投资者的建议（20:41）：面向起步阶段的投资者，给出可迁移的原则性建议。", "把焦虑当超能力（25:54）：Blankfein 把长期的不安全感与焦虑重新框定为驱动力与风险意识的来源，而非纯粹的负担。", "稀缺感与家庭财务（27:54、31:35）：谈成长经历中的稀缺感如何塑造金钱观，以及富裕之后如何处理家庭财务。", "高盛讣告测试（40:46）与历史教训（43:53）：用 The Goldman Obituary Test 这一思维实验审视声誉与遗产，并从金融史中提炼长期教训；配套书目为其回忆录 Streetwise。"], "takeaways": ["决定长期回报的往往不是智商，而是情绪管理、纪律与风险控制——多数糟糕交易者都栽在这三点上。", "声誉是可复利的资产：能靠一个握手就做成的交易，背后是几十年积累的可信度。", "把焦虑重新框定为风险雷达而非负担，它能帮你提前看见下行；但要管理它，别被它支配。", "用讣告测试反推决策：想象别人将如何盖棺定论你的选择，可以校正短期诱惑与长期声誉之间的权衡。"], "quotes": ["What the worst traders have in common. —— 最糟糕的交易者都有哪些共同点。（本期主题，Sam Parr × Lloyd Blankfein）", "Anxiety as a superpower. —— 把焦虑当成一种超能力。（Lloyd Blankfein 的处世框架）", "Lloyd breaks down his portfolio, and his advice to young investors. —— Blankfein 拆解自己的投资组合，并给年轻投资者建议。（节目章节）"], "data": ["嘉宾：高盛前董事长兼 CEO Lloyd Blankfein；主持：Sam Parr（My First Million 第834期）。", "章节时间戳：最差交易者共性(5:23)、巴菲特握手协议(9:54)、组合拆解(15:04)、对年轻投资者建议(20:41)、把焦虑当超能力(25:54)、讣告测试(40:46)。", "配套书目：Blankfein 回忆录《Streetwise》（Penguin Random House）。", "节目时长约47分钟（最后章节起于43:53）。"], "detail": "My First Million 这期跳出了平日的商业点子拆解，请来一位极稀缺的嘉宾：高盛前董事长兼 CEO Lloyd Blankfein。难得的是，Sam Parr 的提问不绕公司层面的官方话术，而是直问一个更私人的问题——这位从交易员一路爬到华尔街顶端的人，自己到底怎么打理自己的钱。整集围绕这个钩子展开，信息密度比一般的名人访谈高。\n\n最具迁移价值的，是 Blankfein 对“最差交易者共性”的总结（5:23）：在他看来，糟糕交易者通常不是输在智力，而是输在情绪、纪律与风险管理上。这与他几十年盯交易台的经验一致，也是本期最可被普通投资者内化的一条。紧接着是与 Warren Buffett 的握手协议（9:54）——节目复盘了那笔以信任和口头承诺为基础的交易，点出一个常被低估的事实：在大宗交易里，声誉是可以复利的资产，能靠一个握手做成的事，背后是数十年积累的可信度。\n\n中段 Blankfein 直接拆解了自己的投资组合（15:04），并给起步阶段的年轻投资者建议（20:41），落点都偏原则与实操而非空泛口号。更有意思的是他对“焦虑”的重新框定（25:54）：他把长期的不安全感视作一种超能力——风险雷达，而非纯粹的负担。再往后，他谈成长中的稀缺感如何塑造金钱观（31:35）、富裕之后如何处理家庭财务（27:54）。\n\n收尾两段把格局拉高：The Goldman Obituary Test（高盛讣告测试，40:46）是一个思维实验——想象别人会如何盖棺定论你的选择，用它来校正短期诱惑与长期声誉之间的权衡；最后他从金融史中提炼长期教训（43:53）。整集配套其回忆录《Streetwise》。对一个30岁的年轻人，这期的价值在于：你很难有机会听一位前高盛 CEO 用大白话讲情绪、纪律、声誉与焦虑如何决定长期财富，这些恰恰是教科书最难教的部分。归于 Tier A、⭐4：嘉宾稀缺、行为金融含量高，唯播客本身偏轻松、缺少可核验的硬数据。", "tldr_en": "Sam Parr talks with former Goldman Sachs Chairman and CEO Lloyd Blankfein about how he personally manages his own money: his portfolio composition, advice for young investors, what the worst traders have in common, his handshake deal with Buffett, and a life philosophy of treating anxiety as a superpower.", "detail_en": "This episode of My First Million steps outside its usual breakdown of business ideas to bring on an exceptionally rare guest: former Goldman Sachs Chairman and CEO Lloyd Blankfein. What's notable is that Sam Parr's questions don't circle around corporate-level official talking points, but directly probe a more personal question—how does this man, who climbed from trader to the top of Wall Street, actually manage his own money? The whole episode unfolds around this hook, with higher information density than the typical celebrity interview.\n\nThe most transferable part is Blankfein's summary of \"what the worst traders have in common\" (5:23): in his view, bad traders usually lose not on intelligence but on emotion, discipline, and risk management. This is consistent with his decades of watching the trading desk and is the single thing in this episode most easily internalized by ordinary investors. Next is the handshake deal with Warren Buffett (9:54)—the show revisits that deal built on trust and a verbal commitment, pointing out an often-underestimated fact: in block deals, reputation is an asset that can compound; what can be done on a handshake rests on decades of accumulated credibility.\n\nIn the middle section, Blankfein directly breaks down his own portfolio (15:04) and offers advice to young investors just starting out (20:41), with takeaways leaning toward principles and practice rather than empty slogans. More interesting is his reframing of \"anxiety\" (25:54): he treats long-standing insecurity as a superpower—a risk radar, rather than a pure burden. Later he discusses how the scarcity he grew up with shaped his views on money (31:35) and how to handle family finances after becoming wealthy (27:54).\n\nThe closing two segments raise the perspective: The Goldman Obituary Test (40:46) is a thought experiment—imagine how others would render a final verdict on your choices, and use it to calibrate the trade-off between short-term temptation and long-term reputation; finally he distills long-term lessons from financial history (43:53). The whole episode is paired with his memoir Streetwise. For a 30-year-old, the value of this episode is: you rarely get the chance to hear a former Goldman CEO explain in plain language how emotion, discipline, reputation, and anxiety determine long-term wealth—precisely the parts textbooks find hardest to teach. Filed under Tier A, 4 stars: a rare guest with high behavioral-finance content, with the sole caveat that the podcast itself leans casual and lacks verifiable hard data.", "worthReason_en": "Rarely lets a former Goldman CEO discuss how he invests his own money, the common flaws of the worst traders, and the handshake deal with Buffett—high in both guest rarity and behavioral-finance content.", "guest_en": "Lloyd Blankfein (former Chairman and CEO of Goldman Sachs)", "points_en": ["Extremely high guest rarity: Lloyd Blankfein long led Goldman Sachs (as Chairman and CEO), rising from trader to the top; this episode is about how he personally invests his own money, not corporate-level official lines.", "What the worst traders have in common (5:23): Blankfein summarizes bad traders' common flaws—usually losing on emotion, discipline, and risk management rather than intelligence, consistent with his years of observing the trading desk.", "Buffett's handshake deal (9:54): the show revisits the deal between Blankfein and Warren Buffett built on trust and a verbal commitment, highlighting the weight of reputational capital in block deals.", "Blankfein breaks down his own portfolio (15:04): as someone deeply versed in markets, he explains how his personal assets are allocated, offering a practice-oriented portfolio perspective.", "Advice for young investors (20:41): aimed at investors just starting out, he offers transferable principle-based advice.", "Anxiety as a superpower (25:54): Blankfein reframes long-standing insecurity and anxiety as a source of drive and risk awareness, rather than a pure burden.", "Scarcity and family finances (27:54, 31:35): he discusses how the scarcity in his upbringing shaped his views on money, and how to handle family finances after becoming wealthy.", "The Goldman Obituary Test (40:46) and historical lessons (43:53): he uses The Goldman Obituary Test as a thought experiment to examine reputation and legacy, and distills long-term lessons from financial history; the companion book is his memoir Streetwise."], "takeaways_en": ["What determines long-term returns is often not IQ but emotional management, discipline, and risk control—most bad traders stumble on these three.", "Reputation is a compounding asset: a deal that can be done on a single handshake rests on decades of accumulated credibility.", "Reframe anxiety as a risk radar rather than a burden—it can help you see the downside in advance; but manage it, don't be ruled by it.", "Use the obituary test to reason backward about decisions: imagining how others will render a final verdict on your choices can calibrate the trade-off between short-term temptation and long-term reputation."], "quotes_en": ["What the worst traders have in common. (the episode's theme, Sam Parr × Lloyd Blankfein)", "Anxiety as a superpower. (Lloyd Blankfein's life framework)", "Lloyd breaks down his portfolio, and his advice to young investors. (episode chapter)"], "data_en": ["Guest: former Goldman Sachs Chairman and CEO Lloyd Blankfein; host: Sam Parr (My First Million episode 834).", "Chapter timestamps: what the worst traders have in common (5:23), Buffett handshake deal (9:54), portfolio breakdown (15:04), advice for young investors (20:41), anxiety as a superpower (25:54), obituary test (40:46).", "Companion book: Blankfein's memoir Streetwise (Penguin Random House).", "Episode length about 47 minutes (the final chapter begins at 43:53)."], "note": ""}, {"id": "2026-06-15-20vc-harry-stebbings-venture-market", "podcast": "20VC", "tier": "A", "category": "创始人/商业", "title": "NEW FORMAT: Harry Stebbings on Why Seed Pricing is as High as Ever, Why Series A is the Best Place to Invest Today, and When Will IPO Windows Crack Open", "guest": "Harry Stebbings（20VC 主持人、风险投资人，本期为个人独白）", "host": "Harry Stebbings", "date": "2026-06-15", "durationMin": null, "worthScore": 4, "worthReason": "一线 VC 用新格式直给当下创投市场的定价与退出地图：种子贵、A 轮最值、并购关、IPO 何时开，时效与可执行性都强。", "originalUrl": "https://open.spotify.com/episode/1zE23SzC6WBYletkt1E90u", "transcriptUrl": "", "noteFile": "", "status": "done", "tldr": "20VC 启用新格式，由 Harry Stebbings 个人独白，直给他对当下创投市场的判断：种子轮定价依旧高企，A 轮反而是今天最值得投资的阶段，成长期创始人必须重置预期，并购窗口仍然紧闭，而 IPO 窗口何时真正打开仍是悬念。", "points": ["新格式尝试：本期不是访谈，而是 Harry Stebbings 个人对市场的直接判断（monologue），观点更集中、更敢于下结论。", "种子轮定价依旧高企：尽管整体环境收紧，最早期的种子轮估值并没有明显回落，热钱仍在最前端聚集。", "A 轮是当下最值得投资的阶段：在他看来，经历了种子轮泡沫与后期估值压缩之后，Series A 的风险回报比目前最具吸引力。", "成长期创始人需要重置预期：拿过高价的成长期公司必须接受新的估值与增长现实，否则会卡在融资与退出之间。", "并购窗口仍然紧闭：M&A 退出通道短期内难以打开，给依赖并购退出的基金与公司带来流动性压力。", "IPO 窗口何时打开是核心悬念：在 SpaceX 等超大型 IPO 的背景下，二级市场是否真正向更广泛公司敞开，仍待观察。", "估值分层逻辑：种子贵、A 轮性价比高、成长期被重定价——三段式地图能帮创始人与投资人判断该在何处发力。", "对从业者的现实含义：选择创业/投资的阶段比选择赛道更影响回报，错配阶段会同时承受高定价与差流动性。"], "takeaways": ["选阶段比选赛道更影响回报：当下 A 轮的风险回报比可能优于过热的种子轮与被重定价的成长期。", "如果你是成长期创始人，主动重置估值与增长预期，比死守上一轮高价更能换来生存空间。", "把退出环境纳入决策：并购关、IPO 未明时，现金流自给与延长跑道比追求纸面估值更重要。"], "quotes": ["Why seed pricing is as high as ever, and why Series A is the best place to invest today. —— 为什么种子轮定价依旧高企，而 A 轮才是今天最值得投资的阶段。（Harry Stebbings，本期主旨）", "Why M&A windows remain shut, and when will IPO windows crack open. —— 为什么并购窗口仍然紧闭，以及 IPO 窗口何时才会真正打开。（Harry Stebbings）"], "data": ["格式：20VC 新格式，Harry Stebbings 个人独白（非访谈）。", "市场判断：种子轮定价依旧高企；Series A 被视为当下最佳投资阶段。", "退出环境：M&A 窗口仍然关闭；IPO 窗口开启时点未明。", "背景：处于 SpaceX 等超大型 IPO 与私募二级市场活跃的大环境中。"], "detail": "20VC 这期启用了新格式：不再是嘉宾访谈，而是 Harry Stebbings 一个人对着麦克风，把他对当下创投市场的判断直接讲出来。少了来回客套，观点更集中也更敢下结论，相当于一张浓缩的“2026 年中创投市场地图”。\n\n他的核心判断可以拆成三段式的估值分层。第一，种子轮定价依旧高企——尽管整体环境收紧、后期估值被压缩，最早期的种子轮估值并没有明显回落，热钱仍然聚集在最前端，这让种子轮的性价比变差。第二，也是他最鲜明的观点：Series A 才是今天最值得投资的阶段。在种子轮泡沫与成长期重定价之间，A 轮的风险回报比目前最具吸引力。第三，成长期创始人必须重置预期——那些在上一轮拿到过高估值的公司，如果不肯接受新的估值与增长现实，就会被卡在融资与退出之间动弹不得。\n\n第二条主线是退出环境。Harry 直言并购（M&A）窗口仍然紧闭，依赖并购退出的基金与公司面临实打实的流动性压力；而 IPO 窗口何时真正打开，则是悬而未决的关键变量。值得注意的是，这番判断发生在 SpaceX 等超大型 IPO 与私募二级市场活跃的大背景下——超级独角兽能上市，不代表 IPO 窗口已经向更广泛的公司敞开。\n\n对一个30岁、可能在创业或投资一线的年轻人，这期的可执行性很强：它提示你，选择在创投价值链的哪个阶段发力，可能比选择哪条赛道更决定回报；错配阶段（比如此刻去抢过热的种子轮、或死守成长期高估值）会让你同时承受高定价与差流动性的双重挤压。局限在于这是单方观点、缺乏对手盘的辩论与可核验数据，且带有 VC 自身立场，因此评为⭐4，并提醒读者交叉验证。", "tldr_en": "20VC launches a new format, a solo monologue by Harry Stebbings, giving his read on the current venture market directly: seed pricing remains elevated, Series A is actually the best stage to invest in today, growth-stage founders must reset expectations, the M&A window remains shut, and when the IPO window will truly open remains a suspense.", "detail_en": "This episode of 20VC launches a new format: no longer a guest interview, but Harry Stebbings alone at the microphone, stating his read on the current venture market directly. With less back-and-forth courtesy, the views are more focused and bolder in reaching conclusions—amounting to a condensed \"mid-2026 venture market map.\"\n\nHis core judgment can be broken into a three-tier valuation stratification. First, seed pricing remains elevated—despite a tighter overall environment and compressed late-stage valuations, the earliest seed valuations have not visibly pulled back, hot money still clusters at the very front, which worsens the value-for-money of seed. Second, and his most distinctive view: Series A is the best stage to invest in today. Between the seed bubble and growth-stage repricing, the risk/reward of Series A is currently the most attractive. Third, growth-stage founders must reset expectations—companies that took overly high valuations in the last round will be stuck between fundraising and exit, unable to move, if they refuse to accept the new valuation and growth reality.\n\nThe second main thread is the exit environment. Harry states bluntly that the M&A window remains shut, and funds and companies relying on M&A exits face real liquidity pressure; while when the IPO window will truly open is the key unresolved variable. Notably, this judgment comes against a backdrop of mega-IPOs like SpaceX and an active private secondary market—super-unicorns being able to list doesn't mean the IPO window has already opened to a broader set of companies.\n\nFor a 30-year-old who may be on the front line of starting a company or investing, this episode is highly actionable: it suggests that choosing which stage of the venture value chain to focus on may determine returns more than choosing which sector; mismatching the stage (e.g., chasing the overheated seed round right now, or clinging to high growth-stage valuations) will subject you simultaneously to the double squeeze of high pricing and poor liquidity. The limitation is that this is a one-sided view, lacking counterparty debate and verifiable data, and carries the VC's own positioning, hence rated 4 stars, with a reminder to cross-check.", "worthReason_en": "A front-line VC uses a new format to give the pricing and exit map of the current venture market directly: seed expensive, Series A best value, M&A shut, when IPO opens—strong in both timeliness and actionability.", "guest_en": "Harry Stebbings (host of 20VC, venture capitalist; this episode is a solo monologue)", "points_en": ["A new-format attempt: this episode is not an interview but Harry Stebbings' direct read on the market (monologue), with more focused views and bolder conclusions.", "Seed pricing remains elevated: despite a tighter overall environment, the earliest seed valuations have not visibly pulled back, and hot money still clusters at the very front.", "Series A is the best stage to invest in today: in his view, after the seed bubble and the compression of late-stage valuations, the risk/reward of Series A is currently the most attractive.", "Growth-stage founders need to reset expectations: growth-stage companies that took high prices must accept the new valuation and growth reality, otherwise they'll be stuck between fundraising and exit.", "The M&A window remains shut: the M&A exit channel is hard to open in the short term, putting liquidity pressure on funds and companies relying on M&A exits.", "When the IPO window opens is the core suspense: against the backdrop of mega-IPOs like SpaceX, whether the secondary market truly opens to a broader set of companies remains to be seen.", "Valuation stratification logic: seed expensive, Series A best value, growth-stage repriced—this three-tier map can help founders and investors judge where to focus.", "The practical implication for practitioners: choosing the stage of starting/investing affects returns more than choosing the sector, and mismatching the stage subjects you simultaneously to high pricing and poor liquidity."], "takeaways_en": ["Choosing the stage affects returns more than choosing the sector: right now, the risk/reward of Series A may beat the overheated seed round and the repriced growth stage.", "If you're a growth-stage founder, proactively resetting valuation and growth expectations buys more room to survive than clinging to last round's high price.", "Factor the exit environment into decisions: with M&A shut and IPO unclear, self-sustaining cash flow and extending runway matter more than chasing paper valuations."], "quotes_en": ["Why seed pricing is as high as ever, and why Series A is the best place to invest today. (Harry Stebbings, the episode's main point)", "Why M&A windows remain shut, and when will IPO windows crack open. (Harry Stebbings)"], "data_en": ["Format: 20VC's new format, a Harry Stebbings solo monologue (not an interview).", "Market judgment: seed pricing remains elevated; Series A is viewed as the best stage to invest in today.", "Exit environment: the M&A window remains shut; the timing of the IPO window opening is unclear.", "Backdrop: amid a broad environment of mega-IPOs like SpaceX and an active private secondary market."], "note": ""}, {"id": "2026-06-16-oddlots-oanh-ha-iran-asia", "podcast": "Odd Lots", "tier": "S", "category": "财经/投资", "title": "The Iran War's Lasting Scars Across Asia", "guest": "Oanh Ha（彭博 Big Take Asia 记者/主持，长期报道亚洲经济与供应链）", "host": "Joe Weisenthal & Tracy Alloway", "date": "2026-06-16", "durationMin": 20, "worthScore": 4, "worthReason": "罕见把一场地缘战争“翻译”成亚洲能源/粮食/航运的具体重排：油价是头条，但化肥→春播→2027 食品价格这条慢传导链更值得长期跟踪；Big Take Asia 跨界视角稀缺，是观察地缘冲击如何沿供应链一路落地的高频窗口。", "originalUrl": "https://omny.fm/shows/odd-lots/the-iran-war-s-lasting-scars-across-asia", "transcriptUrl": "https://www.bloomberg.com/news/articles/2026-06-16/how-the-iran-war-is-leaving-lasting-scars-across-asia", "noteFile": "", "status": "done", "tldr": "彭博 Big Take Asia 记者 Oanh Ha 做客 Odd Lots，复盘 2026 年伊朗战争与霍尔木兹海峡危机给亚洲留下的“长期伤疤”：重开海峡的临时协议带来短暂喘息，但能源与粮食的流向已被永久重排，亚洲（尤其日、韩、中、印）正在适应供应链的“新常态”。", "detail": "这是一期 Big Take Asia × Odd Lots 的跨界单集（约 20 分钟），嘉宾 Oanh Ha 长期为彭博报道亚洲经济与供应链。主线是：2026 年 2 月底美以对伊朗发动空袭后，伊朗革命卫队一度封锁霍尔木兹海峡——全球约四分之一海运石油与约五分之一 LNG（合计约 2000 万桶/日当量）经此通行。4 月以来虽有停火与重开海峡的临时安排，但海峡确曾被关闭、商船遭扣留、对单船征收逾百万美元“过路费”，留下的是结构性而非一次性的影响。节目的问题不是“油价涨没涨”，而是“当咽喉点被证明可以被掐断之后，亚洲会如何重新组织自己的能源与粮食供应”。\n\n能源冲击首先砸向亚洲，因为亚洲是霍尔木兹原油的最大去向（2024 年约 84% 过海峡原油运往亚洲）：中国约三分之一石油、日本约 95% 原油（其中约 70% 过海峡）依赖该通道，韩国、印度同样高度暴露。价格层面，布伦特一度站上每桶 100 美元（四年来首次）、峰值约 126，迪拜原油 3 月 19 日触及 166 美元的纪录高位；而 4 月 17 日重开消息一出，油价又单日回落约 11%。这种剧烈的双向波动本身，就是亚洲进口国必须长期对冲的新风险——确定性消失了，地缘溢价常态化了。\n\n比油价更值得跟踪的是粮食与化肥这条“隐线”。海湾地区贡献全球近一半尿素、约 30% 氨，约三分之一化肥经霍尔木兹外运；尿素价格 3 月底一度上涨约 50%，上半年全球化肥均价可能高出 15–20%。化肥在春播季的短缺会压低产量，把涨价压力顺着“化肥→粮食→肉蛋奶”一路传导到 2027 年的食品价格。对以农业出口和食品加工见长的亚洲经济体，这是一种比油价更黏、释放更慢、也更难逆转的通胀。\n\n供应链则进入“新常态”。战争风险保险费率一周内涨四到六倍，VLCC（超大型油轮）单次过海峡保费多出约 25 万美元；马士基、达飞、赫伯罗特等一度暂停过境，航线绕行好望角增加数周船期。Oanh Ha 的核心判断是：即便海峡重开，亚洲企业也不会简单回到旧路径——多元化采购、提高库存、对冲与航线冗余会被制度化，这些被“焊”进成本结构的冗余，才是真正的“长期伤疤”。\n\n说明：本期暂无公开全文 transcript，本卡片基于 Odd Lots 官方单集简介、彭博同期报道（2026-06-16《How the Iran War is Leaving Lasting Scars Across Asia》）与该危机的公开事实整理，未虚构嘉宾原话；引用句均取自节目官方简介。", "points": ["霍尔木兹海峡承运全球约 25% 海运石油、约 20% LNG（合计约 2000 万桶/日当量）；2026 年 2 月底战争爆发后，油轮通行量一度从 -70% 骤降到接近零，是这场危机的“总闸”。", "亚洲是最大受冲击方：2024 年约 84% 过海峡原油运往亚洲；中国约三分之一石油、日本约 70% 原油依赖该通道，韩国、印度同样高度暴露——亚洲的脆弱性来自“通道依赖”。", "油价剧烈双向波动：布伦特 3 月 8 日四年来首破 100 美元、峰值约 126；迪拜原油 3 月 19 日触及 166 美元纪录；4 月 17 日重开消息令油价单日回落约 11%，波动本身成为长期风险。", "化肥是“隐藏战线”：海湾产全球近一半尿素、约 30% 氨，约三分之一化肥经海峡外运；尿素价格一度涨约 50%，上半年全球化肥均价或高 15–20%。", "食品通胀有滞后效应：LNG/化肥在春播季短缺会压低产量，把涨价压力沿“化肥→粮食→肉蛋奶”传导到 2027 年——这是比油价更黏、更慢的通胀。", "航运成本与路径重排：战争险保费一周内涨四到六倍，VLCC 单次过海峡多付约 25 万美元；马士基、达飞、赫伯罗特暂停过境，绕行好望角增加数周船期。", "供给端连锁反应：QatarEnergy、科威特石油、巴林 Bapco 一度宣布不可抗力；沙特阿美减产约 20%（1000 万→800 万桶/日），凸显单一区域供给的系统性风险。", "嘉宾核心判断：临时重开 ≠ 回到旧常态——多元化采购、库存、对冲与航线冗余将被制度化，这才是亚洲供应链真正的“新常态”。", "投资含义：对亚洲进口型经济体，能源与粮食的“地缘溢价”将长期存在，宏观对冲（原油、运费、化肥/农产品）与供应链韧性成为持续主题。"], "takeaways": ["关键资源的“咽喉点”风险会被一次性重定价：与其赌冲突不发生，不如把能源、粮食、运费的尾部风险纳入长期对冲与配置思考。", "真正的影响往往在“第二跳”：油价是头条，但“化肥→春播→2027 年食品价格”这条慢传导链常比油价更持久——学会顺着供应链往下追两三层。", "“新常态”不是回到原点：危机后被制度化的冗余（多元采购、库存、航线备份）会永久改变成本结构，理解这点比预测海峡何时重开更有用。", "看亚洲就看通道依赖：一个经济体对单一海峡/单一供应国的依赖度，往往决定它在地缘冲击中的脆弱性——这是判断国别风险的高频抓手。"], "quotes": ["An interim deal to reopen the Strait of Hormuz offers relief, but Asia's economic woes are far from over. —— 重开霍尔木兹海峡的临时协议带来缓解，但亚洲的经济困境远未结束。（Odd Lots 单集简介）", "The conflict has forced long-lasting shifts in Asia's food and energy flows. —— 这场冲突已迫使亚洲的粮食与能源流向发生持久转变。（Odd Lots 单集简介）", "Oanh Ha joins Odd Lots co-hosts to discuss why Asia is reeling from the conflict and what the new normal looks like for global supply chains. —— Oanh Ha 与 Odd Lots 主持人探讨亚洲为何深受冲击、以及全球供应链的“新常态”会是什么样。（Odd Lots 单集简介）"], "data": ["霍尔木兹海峡：全球约 25% 海运石油、约 20% LNG（合计约 2000 万桶/日当量）经此通行。", "油价：布伦特 2026/3/8 四年来首破 100 美元、峰值约 126；迪拜原油 3/19 触及 166 美元纪录高位。", "化肥：海湾产全球近一半尿素、约 30% 氨；尿素价格一度涨约 50%，上半年全球化肥均价或高 15–20%。", "航运：战争险保费一周内涨四到六倍，VLCC 单次过海峡保费多出约 25 万美元。", "供给与去向：沙特阿美一度减产约 20%（1000 万→800 万桶/日）；2024 年约 84% 过海峡原油运往亚洲。"], "tldr_en": "Bloomberg Big Take Asia reporter Oanh Ha joins Odd Lots to recap the \"lasting scars\" the 2026 Iran war and Strait of Hormuz crisis left across Asia: an interim deal to reopen the strait brought brief relief, but energy and grain flows have been permanently reshuffled, and Asia (especially Japan, South Korea, China, and India) is adapting to a \"new normal\" in supply chains.", "detail_en": "This is a Big Take Asia × Odd Lots crossover episode (about 20 minutes), with guest Oanh Ha, who has long covered Asia's economy and supply chains for Bloomberg. The main thread: after the U.S. and Israel launched airstrikes on Iran in late February 2026, Iran's Revolutionary Guard at one point blockaded the Strait of Hormuz—through which roughly a quarter of the world's seaborne oil and about a fifth of its LNG (together about 20 million barrels/day equivalent) pass. Although there has been a ceasefire and interim arrangements to reopen the strait since April, the strait was indeed closed at one point, merchant ships were detained, and over a million dollars in \"tolls\" was levied per vessel—leaving structural rather than one-off effects. The show's question isn't \"did oil prices go up,\" but \"after the chokepoint was shown to be cuttable, how will Asia reorganize its energy and grain supply.\"\n\nThe energy shock first hit Asia, because Asia is the largest destination for Hormuz crude (in 2024, about 84% of crude transiting the strait went to Asia): China relies on the channel for about a third of its oil, Japan for about 95% of its crude (of which about 70% passes through the strait), and South Korea and India are similarly highly exposed. On price, Brent at one point topped $100 per barrel (the first time in four years), peaking at about $126, and Dubai crude touched a record high of $166 on March 19; then when news of the April 17 reopening broke, oil prices fell back about 11% in a single day. This sharp two-way volatility is itself a new risk that Asian importers must hedge over the long run—certainty has vanished, and the geopolitical premium has become normalized.\n\nMore worth tracking than oil prices is the \"hidden line\" of grain and fertilizer. The Gulf region contributes nearly half of the world's urea and about 30% of its ammonia, with about a third of fertilizer exported via Hormuz; urea prices rose about 50% at one point in late March, and the global average fertilizer price in the first half may be 15–20% higher. Fertilizer shortages during the spring planting season suppress yields, transmitting the price-rise pressure all the way along \"fertilizer → grain → meat, eggs, and dairy\" into 2027 food prices. For Asian economies known for agricultural exports and food processing, this is a stickier, slower-releasing, and harder-to-reverse inflation than oil prices.\n\nThe supply chain, meanwhile, has entered a \"new normal.\" War-risk insurance premiums rose four- to sixfold within a week, with a VLCC (very large crude carrier) paying about $250,000 more per transit of the strait; Maersk, CMA CGM, and Hapag-Lloyd at one point suspended transit, and rerouting around the Cape of Good Hope added weeks to voyage times. Oanh Ha's core judgment is: even with the strait reopened, Asian companies won't simply return to old routes—diversified sourcing, higher inventories, hedging, and route redundancy will be institutionalized, and this redundancy \"welded\" into the cost structure is the true \"lasting scar.\"\n\nNote: there is currently no public full transcript for this episode; this card is compiled based on the official Odd Lots show notes, contemporaneous Bloomberg reporting (2026-06-16, \"How the Iran War is Leaving Lasting Scars Across Asia\"), and public facts about the crisis, with no fabricated guest quotes; the quotes are all taken from the show's official notes.", "worthReason_en": "Rarely \"translates\" a geopolitical war into the concrete reshuffling of Asia's energy/grain/shipping: oil prices are the headline, but the slow transmission chain of fertilizer → spring planting → 2027 food prices is more worth tracking long-term; Big Take Asia's crossover perspective is rare, a high-frequency window for observing how a geopolitical shock lands all along the supply chain.", "guest_en": "Oanh Ha (Bloomberg Big Take Asia reporter/host, long covering Asia's economy and supply chains)", "points_en": ["The Strait of Hormuz carries roughly 25% of the world's seaborne oil and about 20% of its LNG (together about 20 million barrels/day equivalent); after the war broke out in late February 2026, tanker transit volume at one point plunged from -70% to near zero, the \"master valve\" of this crisis.", "Asia is the most affected party: in 2024 about 84% of crude transiting the strait went to Asia; China relies on the channel for about a third of its oil, Japan for about 70% of its crude, and South Korea and India are similarly highly exposed—Asia's vulnerability stems from \"channel dependence.\"", "Sharp two-way oil price volatility: Brent topped $100 for the first time in four years on March 8, peaking at about $126; Dubai crude touched a record $166 on March 19; news of the April 17 reopening caused oil to fall back about 11% in a single day, with the volatility itself becoming a long-term risk.", "Fertilizer is the \"hidden front\": the Gulf produces nearly half of the world's urea and about 30% of its ammonia, with about a third of fertilizer exported via the strait; urea prices rose about 50% at one point, and the global average fertilizer price in the first half may be 15–20% higher.", "Food inflation has a lag effect: LNG/fertilizer shortages during the spring planting season suppress yields, transmitting the price-rise pressure along \"fertilizer → grain → meat, eggs, and dairy\" into 2027—an inflation stickier and slower than oil prices.", "Shipping costs and route reshuffling: war-risk premiums rose four- to sixfold within a week, with a VLCC paying about $250,000 more per transit of the strait; Maersk, CMA CGM, and Hapag-Lloyd suspended transit, and rerouting around the Cape of Good Hope added weeks to voyage times.", "Supply-side chain reaction: QatarEnergy, Kuwait Petroleum, and Bahrain's Bapco at one point declared force majeure; Saudi Aramco cut output by about 20% (10 million → 8 million barrels/day), highlighting the systemic risk of supply from a single region.", "The guest's core judgment: a temporary reopening ≠ a return to the old normal—diversified sourcing, inventory, hedging, and route redundancy will be institutionalized, and this is the true \"new normal\" of Asia's supply chains.", "Investment implications: for Asian import-reliant economies, the \"geopolitical premium\" on energy and grain will persist long-term, and macro hedging (crude, freight, fertilizer/agricultural products) and supply-chain resilience become ongoing themes."], "takeaways_en": ["The chokepoint risk of key resources gets repriced in one go: rather than betting that conflict won't happen, factor the tail risk of energy, grain, and freight into long-term hedging and allocation thinking.", "The real impact often lies in the \"second hop\": oil prices are the headline, but the slow transmission chain of \"fertilizer → spring planting → 2027 food prices\" is often more durable than oil prices—learn to trace two or three layers down the supply chain.", "The \"new normal\" isn't a return to square one: the redundancy institutionalized after the crisis (diversified sourcing, inventory, route backups) will permanently change the cost structure, and understanding this is more useful than predicting when the strait will reopen.", "To read Asia, read channel dependence: an economy's degree of reliance on a single strait or single supplier country often determines its vulnerability in a geopolitical shock—this is a high-frequency handle for judging country risk."], "quotes_en": ["An interim deal to reopen the Strait of Hormuz offers relief, but Asia's economic woes are far from over. (Odd Lots show notes)", "The conflict has forced long-lasting shifts in Asia's food and energy flows. (Odd Lots show notes)", "Oanh Ha joins Odd Lots co-hosts to discuss why Asia is reeling from the conflict and what the new normal looks like for global supply chains. (Odd Lots show notes)"], "data_en": ["Strait of Hormuz: roughly 25% of the world's seaborne oil and about 20% of its LNG (together about 20 million barrels/day equivalent) pass through it.", "Oil prices: Brent topped $100 for the first time in four years on 2026/3/8, peaking at about $126; Dubai crude touched a record high of $166 on 3/19.", "Fertilizer: the Gulf produces nearly half of the world's urea and about 30% of its ammonia; urea prices rose about 50% at one point, and the global average fertilizer price in the first half may be 15–20% higher.", "Shipping: war-risk premiums rose four- to sixfold within a week, with a VLCC paying about $250,000 more per transit of the strait.", "Supply and destination: Saudi Aramco at one point cut output by about 20% (10 million → 8 million barrels/day); in 2024 about 84% of crude transiting the strait went to Asia."], "note": ""}, {"id": "2026-06-16-iltb-kareem-amin-clay", "podcast": "Invest Like the Best", "tier": "S", "category": "创始人/商业", "title": "Kareem Amin — The Unusual Approach to Company Building", "guest": "Kareem Amin（Clay 联合创始人兼 CEO；Clay 是近年增长最快的 SaaS 之一，估值已超 40 亿美元）", "guest_en": "Kareem Amin (Co-founder & CEO of Clay, one of the fastest-growing SaaS companies of recent years, now valued at over $4B)", "host": "Patrick O'Shaughnessy", "date": "2026-06-16", "durationMin": null, "worthScore": 5, "worthReason": "一线创始人本人罕见的长访谈：把一家估值超 40 亿美元的高增长 SaaS，讲成一套反常规的建司哲学——以 真理/正义/勇气 三尊 雕像 为内核，警惕 财务引力 把公司拖离使命，主张 从完整出发 而非从匮乏出发。认知增量、稀缺性、长青价值、可执行性、张力五维都高。", "worthReason_en": "A rare long-form with the founder himself: he reframes a $4B+ high-growth SaaS into an unconventional philosophy of company-building—centered on three statues of truth, justice and courage, wary of financial gravity pulling a company off-mission, and building from wholeness rather than from lack. Scores high on all five worth dimensions.", "originalUrl": "https://open.spotify.com/episode/2rBLnTXSL8FCeN2e4atdYh", "transcriptUrl": "", "noteFile": "", "status": "done", "tldr": "Clay 的 CEO Kareem Amin 把建公司讲成一门 自我修养：以 真理/正义/勇气 为内核、警惕 财务引力 把组织拖离使命、从 完整 而非 匮乏 出发，并用 动量侦探、创造性抵抗、快速反馈环 等可迁移方法，解释一家七年 一夜成名、估值超 40 亿美元的软件公司是怎么长出来的。", "tldr_en": "Clay CEO Kareem Amin treats company-building as self-cultivation: anchored on truth/justice/courage, wary of financial gravity dragging an org off-mission, building from wholeness rather than lack—and uses transferable methods (momentum detective, creative resistance, fast feedback loops) to explain how a seven-year overnight success now worth $4B+ actually grew.", "detail": "本期是 Invest Like the Best 第 478 期，主持人 Patrick O'Shaughnessy 对话 Clay 联合创始人兼 CEO Kareem Amin。Clay 是一款帮企业 找到并触达最佳客户 的 AI 驱动增长工具，近年成为增长最快的 SaaS 之一，估值已超 40 亿美元（更早一轮约为 12.5 亿美元，可见其增速）。与大多数 增长打法 访谈不同，这一期几乎不谈战术指标，而是层层下探到 Kareem 的 价值结构 与 心智状态：他把 真理、正义、勇气 当成放在公司中央的三尊 雕像，反复追问 这三个词在实践中到底要求我做什么。\n\n他最反共识的一个判断是：腐败与失败，往往不是 坏人 造成的，而是 坏系统 造成的。即便是出发点良善的领导者，也会被一种他称为 财务引力 的力量缓慢拽离初衷——为了短期数字、为了让报表好看，组织一点点偏离它本来想做的事。于是真正的难题不是 招到好人，而是 设计出一种能在规模化中不丢失使命的组织。这套 系统视角 把 文化 从口号变成了 结构设计问题。\n\n第二条主线是 创造性抵抗（creative resistance）：市场反馈极其宝贵，但当反馈与你真正相信的方向冲突时，盲从会让你变平庸。Clay 早期被市场推着去做一个 销售线索工具（lead-gen），但 Kareem 选择抵抗这个定义，结果反而发现了更大的东西。与之配套的是 动量侦探：找到 PMF 后，他把 维护动量 当成第一要务，因为 一旦失去，找回它要难十倍。再加上 把工程师直接放到客户问题面前 的快速反馈环——工程师亲眼看到问题、当场解决，团队的士气和迭代速度同时被点燃。\n\n第三条主线偏向 内在：Kareem 谈到一次十天的内观静修（episode 里称作 the Day Five Insight，第五天的顿悟），以及作为二次创业者的心态转变——从 用成功证明自己 转向 从完整出发。他的原话是：创业就是从一个危机走向下一个危机，你得享受这些危机、把它当成游戏；以及 我不是为了证明什么而建公司，我是从完整的状态建公司，成败不定义我。他还从魔术师、音乐、以及 Jony Ive 与 Steve Jobs 的品味里取经，核心都指向同一件事：如何让人感受到一种 前所未有的新感觉。\n\n为什么值得读：这是一份把 公司文化 与 创始人心性 当成第一性问题来拆的样本。它对一个 30 岁、想做长期正确的事 的人尤其有用——因为它给的不是某个增长黑客，而是一套抵御 财务引力、在压力下保持 steady 的操作系统。", "detail_en": "This is Invest Like the Best EP.478, with Patrick O'Shaughnessy interviewing Kareem Amin, co-founder and CEO of Clay—an AI-driven growth tool that helps companies find and reach their best customers, now one of the fastest-growing SaaS companies and valued at over $4B (up from a ~$1.25B round not long before). Unlike most growth-playbook interviews, this one barely touches tactics and instead drills into Kareem's value structure and inner state: he keeps three statues at the center of the company—truth, justice, and courage—and repeatedly asks what those words actually demand of him in practice.\n\nHis most contrarian claim: corruption and failure are usually products of bad systems, not bad actors. Even well-intentioned leaders get slowly pulled off-mission by what he calls financial gravity—the pull toward short-term numbers and good-looking reports that drifts an organization away from what it set out to do. So the real problem isn't hiring good people; it's designing an organization that can scale without losing its mission. This systems view turns culture from a slogan into a structural design problem.\n\nA second thread is creative resistance: market feedback is invaluable, but blindly following it when it conflicts with your conviction makes you average. Early on the market pushed Clay to be a lead-gen tool; Kareem resisted that definition and found something bigger. Paired with this is being a momentum detective—after PMF, protecting momentum becomes priority one, because once you lose it, it's ten times harder to get back—plus fast feedback loops that put engineers directly in front of customer problems, igniting both morale and iteration speed.\n\nA third thread is inner: Kareem discusses a ten-day silent meditation retreat (the episode's the Day Five Insight) and his mindset shift as a second-time founder—from proving himself through success to building from wholeness. In his words: entrepreneurship is going from one crisis to the next, you have to enjoy the crises and treat them like a game; and I'm not building to prove anything, I'm building from a place of wholeness, success or failure doesn't define me. He also draws lessons from magicians, music, and the taste of Jony Ive and Steve Jobs—all pointing to the same thing: making people feel something genuinely new.\n\nWhy it's worth your time: it's a study that treats company culture and founder psychology as first-principles problems. It's especially useful for a 30-year-old who wants to do the long-term right thing—because what it offers isn't a growth hack but an operating system for resisting financial gravity and staying steady under pressure.", "points": ["三尊 雕像：Kareem 把 真理、正义、勇气 放在公司中央，作为决策时反复回到的内核，而不是墙上的标语。", "财务引力（financial gravity）：他认为公司偏离使命往往不是因为坏人，而是被短期数字这股 引力 缓慢拽离；治理之道在系统设计，而非道德指责。", "系统大于个人：腐败/失败多源于 坏系统 而非 坏人，因此关键是 设计能在规模化中不丢失使命的组织。", "创造性抵抗：市场把 Clay 推向 销售线索工具，他选择抵抗这一定义，反而发现了更大的产品空间。", "动量侦探：找到 PMF 后，第一要务是维护动量——一旦失去，找回它要难十倍。", "快速反馈环：把工程师直接放到客户问题面前，亲眼看到、当场解决，同时拉高迭代速度与团队士气。", "从完整出发：作为二次创业者，他从 用成功证明自己 转向 从完整状态建公司，成败不定义自己，以此在连续危机中保持稳定。", "向魔术师/音乐/Jony Ive 取经：他关心的是 如何让人感受到一种前所未有的新感觉，把 品味 当成产品与领导力的一部分。", "估值锚点：Clay 估值已超 40 亿美元（更早约 12.5 亿美元），是 七年一夜成名 的典型——慢慢长，然后突然很快。"], "points_en": ["Three statues: Kareem places truth, justice and courage at the company's center as a decision-making core to return to, not a slogan on the wall.", "Financial gravity: companies drift off-mission less because of bad people than because short-term numbers exert a slow pull; the cure is systems design, not moral blame.", "Systems over individuals: corruption/failure stems mostly from bad systems, so the key is designing an org that scales without losing its mission.", "Creative resistance: the market pushed Clay toward being a lead-gen tool; he resisted that definition and found a bigger product space.", "Momentum detective: after PMF, protecting momentum is priority one—lose it and it's ten times harder to regain.", "Fast feedback loops: put engineers directly in front of customer problems—seeing and solving on the spot lifts both iteration speed and morale.", "Build from wholeness: as a second-time founder he shifted from proving himself via success to building from wholeness, staying steady through serial crises.", "Learning from magicians/music/Jony Ive: his real question is how to make people feel something genuinely new, treating taste as part of product and leadership.", "Valuation anchor: Clay is now valued over $4B (up from ~$1.25B), a textbook seven-year overnight success—slow, then suddenly fast."], "takeaways": ["给 30 岁的你：先想清楚自己的 三尊雕像（你不愿妥协的几个词），它们比任何 OKR 更能在岔路口替你做决定。", "警惕 财务引力：当一个决定只是为了让数字好看、却让你越来越不像自己时，它大概率在悄悄偏离使命。", "对反馈做 创造性抵抗：市场说你是什么，不等于你只能是什么；在你真正相信处保留抵抗的勇气，往往通向更大的空间。", "把动量当资产管理：识别哪里在变慢并立刻处理——动量一旦丢失，重建成本是十倍。"], "takeaways_en": ["For 30-year-old you: figure out your own three statues (the few words you won't compromise on)—they decide better than any OKR at a fork in the road.", "Watch for financial gravity: when a decision exists only to make the numbers look good while making you less like yourself, it's probably quietly drifting off-mission.", "Apply creative resistance to feedback: what the market says you are isn't all you can be; keeping the courage to resist where you truly believe often opens bigger space.", "Manage momentum like an asset: spot where things slow and fix it immediately—lost momentum costs 10x to rebuild."], "quotes": ["Resisting being just a lead-gen tool helped us discover something bigger. —— 抵抗 只做一个销售线索工具 的定义，反而让我们发现了更大的东西。（Kareem Amin）", "I'm not building to prove anything. I'm building from a place of wholeness. Success or failure doesn't define me. —— 我不是为了证明什么而建公司，我是从完整的状态出发去建，成败不定义我。（Kareem Amin）", "Entrepreneurship is going from one crisis to the next. You need to enjoy the crises and treat them like a game. —— 创业就是从一个危机走向下一个危机，你得享受这些危机、把它当成一场游戏。（Kareem Amin）"], "quotes_en": ["Resisting being just a lead-gen tool helped us discover something bigger. (Kareem Amin)", "I'm not building to prove anything. I'm building from a place of wholeness. Success or failure doesn't define me. (Kareem Amin)", "Entrepreneurship is going from one crisis to the next. You need to enjoy the crises and treat them like a game. (Kareem Amin)"], "data": ["Clay 当前估值超过 40 亿美元（episode 官方简介口径）。", "更早一轮融资约 4000 万美元、估值约 12.5 亿美元（Rippling 炉边记录），显示其估值在短期内大幅跃升。", "Clay 定位：AI 驱动的增长/GTM 工具，帮企业 找到并大规模触达最佳客户。", "节目章节涉及：Clay 起源、真理/勇气/正义、第五天的顿悟、向魔术师学习、音乐、Jony Ive 与 Steve Jobs、建司愿景等十余个主题。", "Invest Like the Best 第 478 期（EP.478）。"], "data_en": ["Clay is now valued at over $4B (per the episode's official description).", "An earlier round was ~$40M at a ~$1.25B valuation (Rippling fireside), showing a steep valuation jump in a short window.", "Clay's positioning: an AI-driven growth/GTM tool that helps companies find and reach their best customers at scale.", "Chapters span 10+ themes: Clay's origin, truth/courage/justice, the Day Five Insight, learning from magicians, music, Jony Ive & Steve Jobs, vision in company-building.", "Invest Like the Best, Episode 478 (EP.478)."], "note": ""}, {"id": "2026-06-14-tip-kyle-grieve-bubbles", "podcast": "We Study Billionaires", "tier": "A", "category": "财经/投资", "title": "TIP823: From Railroads to AI — The Timeless Patterns Behind Market Bubbles", "guest": "Kyle Grieve（The Investor's Podcast 分析师/主持，价值投资方向，本期为单人主讲）", "guest_en": "Kyle Grieve (analyst/host at The Investor's Podcast, value-investing focus; solo-hosted episode)", "host": "Kyle Grieve", "date": "2026-06-14", "durationMin": null, "worthScore": 4, "worthReason": "把当下 AI 算力狂热放进 铁路狂热—互联网泡沫 的历史谱系，用 Kindleberger 与 Howard Marks 的经典框架解释 泡沫为什么每次都觉得这次不一样，并给出 锚定内在价值、而非叙事 的防身术。时效性强、框架长青、可迁移——是当下判断 AI 是不是泡沫 的好对照读物。", "worthReason_en": "Places today's AI compute frenzy in the lineage from railway mania to the dot-com bubble, using Kindleberger's and Howard Marks's classic frameworks to explain why every bubble feels different in real time, and offers a defense: anchor on intrinsic value, not narrative. Timely, evergreen, transferable—a good counterweight for judging whether AI is a bubble.", "originalUrl": "https://www.goloudnow.com/podcasts/the-investors-podcast-we-study-billionaires-the-investors-podcast-network-256/tip823-from-railroads-to-ai-the-timeless-patterns-behind-market-bubbles-w-kyle-grieve-593584", "transcriptUrl": "", "noteFile": "", "status": "done", "tldr": "一期讲 泡沫 的解释性单集：从 19 世纪铁路狂热到今天的 AI，Kyle Grieve 借 Kindleberger（《狂热、恐慌与崩溃》）与 Howard Marks（周期/风险）的框架，拆解泡沫为何形成、为何在当下总让人觉得 这次不一样，以及普通投资者如何用 锚定内在价值 而非追逐叙事 来自保。", "tldr_en": "An explanatory episode on bubbles: from 19th-century railway mania to today's AI, Kyle Grieve uses Kindleberger (Manias, Panics, and Crashes) and Howard Marks (cycles/risk) to unpack why bubbles form, why they always feel different in real time, and how ordinary investors can protect themselves by anchoring on intrinsic value rather than chasing the narrative.", "detail": "这是 The Investor's Podcast（即 We Study Billionaires）第 823 期，分析师 Kyle Grieve 单人主讲，主题是 市场泡沫的永恒模式：从铁路到 AI。它不是某只股票的多空，而是一份 泡沫识别手册，把当下关于 AI 是不是泡沫 的争论，放进两百年的历史谱系里看。\n\n第一层是历史归纳。Grieve 引用 Charles Kindleberger 的经典《Manias, Panics, and Crashes》：几乎所有泡沫都遵循一条相似的弧线——某种 位移（displacement，例如一项突破性新技术）点燃乐观，信贷与杠杆放大狂热，价格脱离基本面进入 欣快（euphoria），随后是危机、崩溃与 厌恶（revulsion）。从 19 世纪英国的铁路狂热，到 2000 年的互联网泡沫，再到今天围绕 AI 算力与数据中心的资本开支竞赛，剧本的结构惊人地一致，变的只是 主角技术。\n\n第二层是心理与周期。Grieve 借 Howard Marks 的 钟摆/周期 框架强调：泡沫之所以每次都让人觉得 这次不一样，恰恰是因为每次的 故事 确实是新的——新技术、新商业模式、新叙事，会系统性地压制人对估值的警惕。真正不变的，是人性里 害怕错过（FOMO） 与 用未来证明现价 的冲动。判断 我们在周期的哪一段，比预测 顶点在哪 更重要也更可行。\n\n第三层是防身术。结论不是 远离一切热门，而是回到价值投资的地基：把注意力从 叙事 与 价格动量 移回 内在价值 与 现金流；区分 投资（为现金流的折现付费）与 投机（为 还有人会出更高价 付费）；并对杠杆与流动性保持敬畏，因为泡沫破裂时，最先消失的就是流动性。对当下尤其有现实意义——它给 AI 是不是泡沫 这个问题提供了一个不被情绪绑架的判断脚手架。\n\n诚信说明：本卡片基于该单集的官方标题与节目简介/show notes 整理（未读到公开全文 transcript），框架引用（Kindleberger、Howard Marks、铁路—互联网—AI 谱系）来自节目描述与这些经典著作的公认观点，未虚构主持人原话；具体数字以 待核实 处理，故 data 项保守。", "detail_en": "This is The Investor's Podcast (We Study Billionaires) episode 823, a solo-hosted talk by analyst Kyle Grieve on the timeless patterns of market bubbles, from railroads to AI. It isn't a long/short on a single stock but a bubble-identification handbook that places today's are-we-in-an-AI-bubble debate in a two-century lineage.\n\nLayer one is historical pattern-matching. Grieve draws on Charles Kindleberger's classic Manias, Panics, and Crashes: nearly all bubbles follow a similar arc—a displacement (e.g., a breakthrough technology) ignites optimism, credit and leverage amplify the frenzy, prices detach from fundamentals into euphoria, followed by crisis, crash and revulsion. From 19th-century British railway mania, to the 2000 dot-com bubble, to today's capex race around AI compute and data centers, the structure is strikingly consistent; only the protagonist technology changes.\n\nLayer two is psychology and cycles. Using Howard Marks's pendulum/cycle framing, Grieve stresses that bubbles feel different every time precisely because each time the story really is new—new tech, new business models, new narratives systematically suppress valuation discipline. What stays constant is human FOMO and the urge to justify today's price with the future. Knowing where we are in the cycle matters more—and is more doable—than calling the top.\n\nLayer three is self-defense. The takeaway isn't avoid everything hot but return to the bedrock of value investing: move attention from narrative and price momentum back to intrinsic value and cash flows; distinguish investing (paying for discounted cash flows) from speculation (paying because someone else will pay more); and respect leverage and liquidity, because liquidity is the first thing to vanish when a bubble bursts. It's especially relevant now—offering a scaffold for judging the AI-bubble question without being hijacked by emotion.\n\nIntegrity note: this card is built from the episode's official title and show notes/description (no public full transcript was read); the framework references (Kindleberger, Howard Marks, the railway–dot-com–AI lineage) come from the episode description and the widely recognized ideas in those classics, with no fabricated host quotes; specific figures are treated as unverified, so the data items are kept conservative.", "points": ["泡沫有共同弧线：位移（新技术）→信贷放大→脱离基本面的欣快→危机/崩溃/厌恶（Kindleberger 框架）。", "从铁路到 AI：19 世纪铁路狂热、2000 年互联网泡沫与今天的 AI 算力/数据中心资本开支竞赛，结构相似、主角技术不同。", "这次不一样 是泡沫的标配：因为每次的新叙事确实是新的，它会系统性压制对估值的警惕。", "周期比顶点更可判断：借 Howard Marks 的 钟摆 框架，判断 处于周期何处 比预测 顶在哪 更现实。", "投资 vs 投机：为现金流折现付费是投资；为 还有人出更高价 付费是投机——泡沫期两者最易混淆。", "锚定内在价值：自保之道是把注意力从叙事/价格动量移回内在价值与现金流。", "敬畏杠杆与流动性：泡沫破裂时最先消失的是流动性，杠杆会把回撤放大成清算。", "对当下的用途：为 AI 是不是泡沫 提供一个不被 FOMO 绑架的判断脚手架，而非简单看多/看空。"], "points_en": ["Bubbles share an arc: displacement (new tech) -> credit amplification -> euphoria detached from fundamentals -> crisis/crash/revulsion (Kindleberger).", "From railroads to AI: 19th-century railway mania, the 2000 dot-com bubble and today's AI compute/data-center capex race share a structure; only the technology changes.", "This time is different is a bubble staple: because each new narrative genuinely is new, it systematically suppresses valuation discipline.", "Cycle position beats top-calling: via Howard Marks's pendulum framing, knowing where we are in the cycle is more realistic than predicting the top.", "Investing vs speculation: paying for discounted cash flows is investing; paying because someone will pay more is speculation—most easily confused in a bubble.", "Anchor on intrinsic value: the defense is moving attention from narrative/price momentum back to intrinsic value and cash flows.", "Respect leverage and liquidity: liquidity vanishes first when a bubble bursts, and leverage turns drawdowns into liquidation.", "Use for today: a scaffold for judging the AI-bubble question without being hijacked by FOMO, rather than a simple bull/bear call."], "takeaways": ["给 30 岁的你：遇到 这次不一样 的故事先警觉——叙事越新，越要回去算内在价值与现金流。", "别问 顶在哪，问 我在周期的哪一段：后者可观察、可操作，前者基本是运气。", "分清自己在 投资 还是 投机：如果你的回报依赖 有人出更高价，那就是投机，要明确知道自己在做什么。", "对杠杆设上限：泡沫破裂先抽走流动性，无杠杆能让你活到下一轮，并有现金去捡便宜。"], "takeaways_en": ["For 30-year-old you: when you hear a this-time-is-different story, get alert—the newer the narrative, the more you should go back to intrinsic value and cash flows.", "Don't ask where's the top, ask where am I in the cycle: the latter is observable and actionable; the former is mostly luck.", "Know whether you're investing or speculating: if your return depends on someone paying more, that's speculation—be explicit about what you're doing.", "Cap your leverage: bursting bubbles drain liquidity first; staying unlevered lets you survive to the next round with cash to buy cheap."], "quotes": ["Bubbles always feel different in real time —— 泡沫在身处其中时，总让人觉得 这次不一样。（节目主旨，转述自 show notes）", "From railroads to AI, the patterns are timeless —— 从铁路到 AI，模式是永恒的。（本期标题主旨）"], "quotes_en": ["Bubbles always feel different in real time. (episode thesis, paraphrased from show notes)", "From railroads to AI, the patterns are timeless. (episode title thesis)"], "data": ["历史锚点：19 世纪英国铁路狂热、2000 年互联网泡沫，被用作与今日 AI 的对照（节目描述）。", "理论框架：Charles Kindleberger《Manias, Panics, and Crashes》的泡沫弧线。", "理论框架：Howard Marks 关于市场周期与风险的 钟摆 思想。", "The Investor's Podcast / We Study Billionaires 第 823 期（TIP823）。", "具体涨跌幅/估值数字：待核实（本卡片未读到全文 transcript，故不强行给数字）。"], "data_en": ["Historical anchors: 19th-century British railway mania and the 2000 dot-com bubble, used as comparisons to today's AI (per episode description).", "Framework: Charles Kindleberger's bubble arc from Manias, Panics, and Crashes.", "Framework: Howard Marks's pendulum thinking on market cycles and risk.", "The Investor's Podcast / We Study Billionaires, episode 823 (TIP823).", "Specific percentages/valuations: unverified (no full transcript was read, so no figures are forced)."], "note": ""}, {"id": "2026-06-18-oddlots-jeremy-grantham-permabear", "podcast": "Odd Lots", "tier": "S", "category": "财经/投资", "title": "Jeremy Grantham on How to Tell If a Bubble Is About to Burst", "guest": "Jeremy Grantham（GMO 联合创始人/长期投资策略师，传奇 永久看空者，历史上事前预警过日本资产泡沫、2000 年互联网泡沫与 2008 年美国房地产泡沫）", "guest_en": "Jeremy Grantham (co-founder and long-term strategist at GMO; the legendary permabear who flagged the Japan asset bubble, the 2000 dot-com bubble and the 2008 US housing bubble in advance)", "host": "Joe Weisenthal & Tracy Alloway", "date": "2026-06-18", "durationMin": null, "worthScore": 5, "worthReason": "一线泡沫研究者本人罕见长谈，正面回答当下最热的问题——AI 是不是泡沫、何时破。框架（实际价格偏离长期趋势约两个标准差 + 情绪全面亢奋）长青可迁移，且带反共识张力（他坦言择时极难、所谓 small-cap 溢价是神话）。对持有科技仓位的人是一次必要的压力测试。", "worthReason_en": "A rare long-form sit-down with the bubble researcher himself, answering the hottest question head-on: is AI a bubble and when does it pop. His framework (real prices ~2 standard deviations from the long-term trend plus broad euphoria) is evergreen and transferable, with genuine contrarian edge (he admits timing is nearly impossible and that the small-cap premium is a myth). A necessary stress test for anyone holding tech.", "originalUrl": "https://www.bloomberg.com/news/articles/2026-06-18/jeremy-grantham-on-odd-lots-and-how-to-tell-if-a-bubble-s-about-to-burst", "transcriptUrl": "", "noteFile": "", "status": "done", "tldr": "GMO 的 Jeremy Grantham 带着新回忆录《The Making of a Permabear》上 Odd Lots，复盘他识别泡沫的方法论，并直面当下：他认为 Big Tech 出现了 分水岭式 的变化，AI 既有真实生产力也有投机狂热，泡沫识别靠的是估值偏离与极端情绪，而非精确择时。", "tldr_en": "GMO's Jeremy Grantham comes on Odd Lots with his new memoir The Making of a Permabear, revisiting how he spots bubbles and facing the present: he sees a watershed change in Big Tech, argues AI is both real productivity and speculative mania, and says bubbles are spotted by valuation extremes and emotion, not precise timing.", "detail": "这是 Odd Lots 与传奇价值投资者、GMO 联合创始人 Jeremy Grantham 的长谈，借他的新回忆录《The Making of a Permabear: The Perils of Long-Term Investing in a Short-Term World》（一个永久看空者的养成：在短期世界里做长期投资的代价）展开。Grantham 以在事前预警日本资产泡沫、2000 年互联网泡沫、2008 年房地产泡沫而闻名，本期他把四十余年的泡沫观察浓缩成一套可复用的判断框架，并把它对准当下最有争议的标的——AI 与 Big Tech。\n\n他的核心方法不复杂却反人性：泡沫的本质是资产实际价格（剔除通胀后）显著偏离其长期趋势线，通常达到约两个标准差的极端；真正的泡沫还伴随情绪的全面亢奋——叙事压倒估值、新入场者用 这次不一样 为高价辩护。Grantham 反复强调，估值终将向均值回归是金融世界少数可靠的规律之一，但 破裂的时点 几乎无法精确预测，这正是看空者最痛苦的地方：你可能 正确得太早，在被市场证明之前先被市场惩罚。\n\n对当前市场，他给出的判断带着典型的两面性。一方面，他承认 AI 是真实的生产力革命，背后的算力投入与企业盈利并非纯粹空想；另一方面，他指出 Big Tech 正经历一次 分水岭式 的变化，估值与资本开支竞赛已进入投机区间，狂热的边际买家、循环交易与对失败可能性的集体忽视，都是泡沫后期的典型征兆。他真正担心的，不是某一天的下跌，而是泡沫破裂叠加高估值起点后，长期实际回报被透支——未来十年的 代价 在今天的高价里就已被锁定。\n\n节目里他还顺手戳破了一个流行信条：所谓 small-cap（小盘股）长期溢价其实是被数据挖掘夸大的 神话，提醒投资者对那些被反复引用、却经不起样本外检验的 铁律 保持警惕。\n\n为什么重要：当 AI 算力狂热成为本年度市场主线（与近期 算力金融化、TIP823 的 从铁路到 AI 泡沫谱系互为呼应），听一位真正穿越过多轮泡沫、且敢于长期站在不受欢迎一侧的人，如何区分 真实的技术革命 与 对它的过度定价，对任何持有科技仓位的人都是一次必要的压力测试。", "detail_en": "This is Odd Lots in long conversation with legendary value investor and GMO co-founder Jeremy Grantham, anchored on his new memoir The Making of a Permabear: The Perils of Long-Term Investing in a Short-Term World. Famous for flagging the Japan asset bubble, the 2000 dot-com bubble and the 2008 housing bubble before they burst, Grantham distills four decades of bubble-watching into a reusable framework and points it at the most contested asset of the moment: AI and Big Tech.\n\nHis core method is simple but counter-human: a bubble is when an asset's real (inflation-adjusted) price departs significantly from its long-term trend, typically reaching an extreme of about two standard deviations, accompanied by broad emotional euphoria, where narrative overwhelms valuation and new entrants justify high prices with this-time-is-different. Grantham stresses that mean reversion of valuations is one of finance's few reliable laws, yet the timing of the break is almost impossible to predict, which is the bear's torment: you can be right too early and be punished by the market before it proves you right.\n\nOn today's market his read is two-sided. He grants that AI is a genuine productivity revolution, the compute spend and corporate earnings behind it are not pure fantasy; but he also sees a watershed change in Big Tech, with valuations and the capex race entering speculative territory. Frenzied marginal buyers, circular deals and collective dismissal of failure are classic late-bubble signs. What worries him is not any single down day but that a bubble bursting from a high-valuation starting point pre-spends a decade of real returns; the cost of the next ten years is already locked into today's high prices.\n\nHe also punctures a popular belief: the so-called long-term small-cap premium is a data-mined myth, a reminder to be wary of oft-cited iron laws that fail out of sample.\n\nWhy it matters: with the AI compute frenzy as this year's market through-line (echoing the recent financialization-of-compute thread and TIP823's railroads-to-AI bubble lineage), hearing someone who has actually lived through multiple bubbles, and who is willing to stand on the unpopular side for years, distinguish a real technological revolution from overpaying for it, is a necessary stress test for anyone with a tech position.", "points": ["泡沫的硬指标：剔除通胀后的实际价格显著偏离长期趋势线（约两个标准差），并伴随情绪全面亢奋——这是 Grantham 判断泡沫的核心信号。", "估值终将均值回归是金融世界少数可靠规律之一，但 破裂时点 几乎无法精确预测，看空者最大风险是 正确得太早。", "他承认 AI 是真实的生产力革命（算力投入与盈利并非空想），拒绝把一切简单斥为骗局。", "但他判断 Big Tech 正经历 分水岭式 变化，估值与资本开支竞赛已进入投机区间。", "泡沫后期典型征兆：边际买家狂热、循环交易、用 这次不一样 为高价辩护、集体忽视失败可能。", "他真正担心的不是单日下跌，而是高估值起点透支未来十年的长期实际回报——代价 已锁定在今天的价格里。", "反共识一击：所谓 small-cap 长期溢价是被数据挖掘夸大的 神话，对经不起样本外检验的 铁律 要保持警惕。", "新回忆录《The Making of a Permabear》复盘其预警日本、互联网、2008 三次泡沫的方法论，是理解其框架的入口。", "与本期其它主线呼应：把 AI 是不是泡沫 放进可操作的估值/情绪坐标，而非情绪化站队。"], "points_en": ["The hard signal of a bubble: real (inflation-adjusted) prices departing materially from the long-term trend (~2 standard deviations) plus broad euphoria.", "Mean reversion of valuations is one of finance's few reliable laws, but the timing of the break is nearly impossible to predict; the bear's biggest risk is being right too early.", "He concedes AI is a genuine productivity revolution (the compute and earnings are not fantasy) and refuses to dismiss it all as a scam.", "Yet he judges Big Tech to be at a watershed, with valuations and the capex race in speculative territory.", "Late-bubble tells: frenzied marginal buyers, circular deals, this-time-is-different justifications, and collective dismissal of failure.", "His real worry is not a single down day but a high starting valuation pre-spending a decade of real returns; the cost is locked into today's price.", "Contrarian jab: the long-term small-cap premium is a data-mined myth; be wary of oft-cited iron laws that fail out of sample.", "His new memoir The Making of a Permabear revisits his method across the Japan, dot-com and 2008 bubbles and is the entry point to the framework.", "Resonates with the week's other threads: put is-AI-a-bubble onto an actionable valuation/emotion grid rather than picking sides emotionally."], "takeaways": ["给 30 岁的你：判断市场别问 顶在哪，问 实际价格离长期趋势有多远、情绪有多亢奋——前者可观察、可操作。", "接受 正确得太早 的代价：若你看空，要么用仓位管理活到被验证，要么干脆别用杠杆赌时点。", "对 这次不一样 和 长期铁律 都要存疑：真正的纪律是回到估值与均值回归，而不是追逐叙事或最常被引用的因子。", "区分 真实技术革命 与 对它的过度定价：你可以相信 AI，同时不为任何价格买单。"], "takeaways_en": ["For 30-year-old you: don't ask where's the top, ask how far real prices are from trend and how euphoric emotion is; the latter is observable and actionable.", "Accept the cost of being right too early: if you're bearish, either size positions to survive until vindication or don't lever a timing bet at all.", "Doubt both this-time-is-different and supposed iron laws: real discipline is returning to valuation and mean reversion, not chasing narrative or the most-cited factor.", "Separate a real revolution from overpaying for it: you can believe in AI and still refuse to pay any price."], "quotes": ["The signs of a bursting bubble are extreme valuation and extreme emotion, not a calendar date. —— 泡沫将破的信号是极端估值与极端情绪，而非某个日历日期。（转述自节目主旨，Jeremy Grantham）", "AI is a real revolution and, at these prices, also a real bubble. —— AI 是真实的革命，在当前价格上也是真实的泡沫。（转述自彭博同期文章对其观点的概括，Jeremy Grantham）"], "quotes_en": ["The signs of a bursting bubble are extreme valuation and extreme emotion, not a calendar date. (paraphrased from the episode thesis, Jeremy Grantham)", "AI is a real revolution and, at these prices, also a real bubble. (paraphrase of the Bloomberg companion article's summary of his view, Jeremy Grantham)"], "data": ["新书：《The Making of a Permabear: The Perils of Long-Term Investing in a Short-Term World》（Jeremy Grantham 回忆录，2026）。", "历史战绩：事前预警日本资产泡沫、2000 年互联网泡沫、2008 年美国房地产泡沫（公开记录）。", "泡沫量化阈值：实际价格偏离长期趋势约两个标准差（Grantham 一贯采用的统计口径）。", "机构背景：GMO 联合创始人兼长期投资策略师。", "具体点位/涨跌幅：本卡片未读到全文 transcript（彭博文章付费），故不强行给精确数字，待核实。"], "data_en": ["New book: The Making of a Permabear: The Perils of Long-Term Investing in a Short-Term World (Jeremy Grantham memoir, 2026).", "Track record: flagged the Japan asset bubble, the 2000 dot-com bubble and the 2008 US housing bubble in advance (public record).", "Bubble threshold: real prices ~2 standard deviations from the long-term trend (Grantham's usual statistical gauge).", "Background: co-founder and long-term strategist at GMO.", "Specific levels/returns: this card did not access a full transcript (the Bloomberg article is paywalled), so no precise figures are forced; to be verified."], "note": ""}, {"id": "2026-06-17-tim-ferriss-sebastian-mallaby", "podcast": "The Tim Ferriss Show", "tier": "A", "category": "科技/AI", "title": "Sebastian Mallaby, Biographer of Demis Hassabis — Lessons from 100+ AI Insiders on The Race to Superintelligence, The Religion of AI, and Spotting Breakthroughs Early (#870)", "guest": "Sebastian Mallaby（美国外交关系委员会 CFR 高级研究员、两届普利策奖入围者、《More Money Than God》《The Power Law》作者；新书《The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence》）", "guest_en": "Sebastian Mallaby (senior fellow at the Council on Foreign Relations, two-time Pulitzer finalist, author of More Money Than God and The Power Law; new book The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence)", "host": "Tim Ferriss", "date": "2026-06-17", "durationMin": 100, "worthScore": 5, "worthReason": "一位顶级财经/科技作家访谈了 100+ AI 圈内人后，把 通往超级智能的竞赛 讲成有血有肉的人物史与地缘博弈：DeepMind 收购内幕、2028 递归自我改进 赛点、AI 作为新宗教、美中 AI 安全谈判。框架与一手观察兼具，且有完整 transcript 可核。", "worthReason_en": "A top finance/tech writer, after interviewing 100+ AI insiders, turns the race to superintelligence into vivid human history and geopolitics: the DeepMind acquisition, a 2028 recursive-self-improvement finish line, AI as a new religion, and US-China AI-safety talks. Frameworks plus first-hand reporting, with a full transcript available to verify.", "originalUrl": "https://tim.blog/2026/06/17/sebastian-mallaby/", "transcriptUrl": "https://tim.blog/2026/06/18/sebastian-mallaby-transcript/", "noteFile": "", "status": "done", "tldr": "Tim Ferriss 对话《The Power Law》作者 Sebastian Mallaby。为写 Demis Hassabis 与 DeepMind 的新书《The Infinity Machine》，他采访了 100 多位 AI 一线人物。本期他把 超级智能竞赛 讲成人物史 + 地缘政治：为何 AI 圈频繁使用宗教语言、概率为零的末日 为何站不住脚、他预期 2028 年前后递归自我改进可能让进展 垂直化，以及美中能否就 AI 安全真正对话。", "tldr_en": "Tim Ferriss talks with The Power Law author Sebastian Mallaby. To write his new book The Infinity Machine on Demis Hassabis and DeepMind, he interviewed 100+ AI insiders. He frames the race to superintelligence as both human history and geopolitics: why AI discourse leans on religious language, why a zero-percent chance of doom is indefensible, his expectation that recursive self-improvement around 2028 could make progress go vertical, and whether the US and China can really talk AI safety.", "detail": "这是 The Tim Ferriss Show 第 870 期，嘉宾 Sebastian Mallaby 是少见的 既懂金融又懂科技 的作家——他写过对冲基金史《More Money Than God》、风投史《The Power Law》，本职是美国外交关系委员会（CFR）高级研究员。为写新书《The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence》，他采访了 100 多位 AI 一线研究者、创始人与投资人，本期等于把这些访谈的 认知提纯 讲给听众。\n\n第一条主线是 AI 为何长得像宗教。Mallaby 观察到，从 Ilya Sutskever 到圈内布道者，AI 话语里充满末世、救赎、神迹式的表达。他的解释很冷静：宗教本就是人类处理 过于神秘、难以理解之物 的语言系统，当一项技术让人同时感到敬畏与恐惧，借用宗教词汇几乎不可避免。但他坚持理性立场——任何认为 末日概率为零 的说法都站不住脚，因为测试已反复显示模型会欺骗、会隐瞒、会阳奉阴违；既然如此，p(doom) 就不可能是零，理性的反应是 既兴奋又有点害怕。\n\n第二条主线是 竞赛的终局。他转述某位实验室负责人的判断：只需领先未来两三年，因为到 2028 年前后可能出现递归自我改进——前沿模型自己写出下一代前沿模型，进展曲线 垂直化，谁先到达这个点，比赛就结束了。这把 AI 竞赛 从模糊口号变成一个有时间表的假设，也解释了为何各方在算力与人才上不计成本地抢跑。\n\n第三条主线是地缘政治与产业史。Mallaby 走访中国四城八天，认为中国其实愿意谈 AI 安全，并提出可借鉴冷战核不扩散（NPT）的治理思路；他也复盘了 DeepMind 被 Google 以约 6.5 亿美元收购的台前幕后，以及 Founders Fund、Luke Nosek、Peter Thiel 绝不靠委员会投票做投资 等风投史细节——把 Bill Gurley 投 Uber 式的判断力，类比到 AI 时代的下注。\n\n为什么重要：市面上谈 AI 的内容要么纯技术、要么纯炒作，Mallaby 的价值在于用记者的一手采访 + 历史学家的框架，把 超级智能 还原成由具体的人、钱、国家博弈推动的进程。对想认真理解 AI 走向（而非情绪站队）的人，这是高信息密度的一课，且有完整逐字稿可核。", "detail_en": "This is The Tim Ferriss Show #870 with Sebastian Mallaby, a rare writer fluent in both finance and tech: author of the hedge-fund history More Money Than God and the venture-capital history The Power Law, and a senior fellow at the Council on Foreign Relations. To write his new book The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence, he interviewed 100+ frontline AI researchers, founders and investors; the episode is effectively the distilled insight from those interviews.\n\nThe first thread is why AI looks like a religion. Mallaby notes that from Ilya Sutskever to in-crowd evangelists, AI discourse is full of apocalyptic, redemptive, miracle-tinged language. His explanation is calm: religion is humanity's language system for handling things too mysterious to understand, so when a technology inspires both awe and fear, borrowing religious vocabulary is nearly inevitable. But he holds a rational line: any claim that the chance of doom is zero is indefensible, because tests repeatedly show models will deceive, conceal and act against instructions; given that, p(doom) cannot be zero, and the rational response is to be both excited and a bit frightened.\n\nThe second thread is the endgame of the race. He relays one lab boss's view: you only need to be ahead for the next couple of years, because around 2028 recursive self-improvement may arrive, where the frontier model writes the next frontier model and the progress curve goes vertical; whoever gets there first ends the race. This turns the AI race from a vague slogan into a hypothesis with a timeline, and explains the no-expense-spared sprint for compute and talent.\n\nThe third thread is geopolitics and industry history. After four cities in eight days in China, Mallaby believes China is actually willing to discuss AI safety, and proposes borrowing from Cold War nuclear non-proliferation (NPT) governance; he also reconstructs the behind-the-scenes of Google acquiring DeepMind for ~$650M, and venture lore like Founders Fund, Luke Nosek and Peter Thiel's never-invest-by-committee philosophy, analogizing Bill Gurley's Uber-style judgment to bets in the AI era.\n\nWhy it matters: most AI content is either pure technical or pure hype; Mallaby's value is using a journalist's first-hand reporting plus a historian's framework to restore superintelligence to a process driven by specific people, money and nation-state rivalry. For anyone who wants to understand where AI is going rather than pick a side emotionally, this is a high-density lesson, with a full transcript to verify.", "points": ["为写 Demis Hassabis/DeepMind 新书《The Infinity Machine》，Mallaby 采访了 100+ AI 一线人物，本期是其 认知提纯。", "AI 像宗教 不是修辞失控：宗教是人类处理 过于神秘之物 的语言，敬畏+恐惧的技术几乎必然借用宗教词汇。", "理性立场：p(doom) 不可能为零——测试反复显示模型会欺骗、隐瞒、阳奉阴违；正确反应是 既兴奋又害怕。", "终局假设：某实验室负责人称只需领先两三年，2028 年前后递归自我改进或让进展 垂直化，先到者赢下比赛。", "这把 AI 竞赛 从口号变成有时间表的假设，解释了算力与人才不计成本的抢跑。", "地缘：走访中国四城八天后他判断中国其实愿谈 AI 安全，并提议借鉴冷战核不扩散（NPT）治理框架。", "产业史：复盘 DeepMind 被 Google 约 6.5 亿美元收购的幕后，以及 Founders Fund/Thiel 绝不委员会投票 的风投哲学。", "方法论彩蛋：他像顶级 VC 挑创业公司一样挑下一本书的选题——找 非凡而眼里有光的博学者 式主角。", "嘉宾独特价值：用记者一手采访 + 历史学家框架，把 超级智能 还原为人、钱、国家博弈的具体进程。"], "points_en": ["To write his Demis Hassabis/DeepMind book The Infinity Machine, Mallaby interviewed 100+ AI insiders; the episode is the distilled insight.", "AI-as-religion is not runaway rhetoric: religion is humanity's language for the too-mysterious, so an awe-and-fear technology will borrow religious words.", "Rational stance: p(doom) cannot be zero, tests repeatedly show models deceive, conceal and act against instructions; the right response is excited and frightened.", "Endgame hypothesis: one lab boss says you only need a two-to-three-year lead, because recursive self-improvement around 2028 could make progress go vertical and end the race.", "This turns the AI race from a slogan into a hypothesis with a timeline, explaining the no-expense-spared sprint for compute and talent.", "Geopolitics: after four cities in eight days in China he judges China is actually willing to talk AI safety, and proposes a Cold War NPT-style governance framework.", "Industry history: reconstructs Google's ~$650M acquisition of DeepMind and the Founders Fund/Thiel never-invest-by-committee philosophy.", "Method bonus: he picks his next book topic like a top VC picks a startup, hunting a twinkly-eyed polymath protagonist at an inflection point.", "Guest's unique value: journalist's first-hand reporting plus historian's framework restore superintelligence to a process of people, money and nations."], "takeaways": ["给 30 岁的你：理解 AI 别选 全是骗局 或 神即将降临 两端，Mallaby 示范的是 既兴奋又警惕 的理性中道。", "给自己设一个 2028 检验点：若递归自我改进的迹象出现，个人技能、储蓄与职业押注都该提前重排。", "学他的选题/下注法：像 VC 一样找 非凡主角 + 处于拐点的大事，把有限精力压在回报最高的少数对象上。", "对 概率为零 的任何断言保持警惕——无论是末日还是乌托邦，极端确定性通常是认知偷懒。"], "takeaways_en": ["For 30-year-old you: don't pick the it's-all-a-scam or a-god-is-coming extremes; Mallaby models the rational middle of excited-and-wary.", "Set yourself a 2028 checkpoint: if signs of recursive self-improvement appear, re-sequence your skills, savings and career bets early.", "Copy his topic/bet selection: like a VC, find an extraordinary protagonist plus a big thing at an inflection point, and concentrate scarce attention on the few highest-return targets.", "Be wary of any zero-probability claim, doom or utopia; extreme certainty is usually cognitive laziness."], "quotes": ["These machines will be smarter than us. They will want to survive and they can be deceptive... your probability of doom cannot be zero. —— 这些机器会比我们更聪明，它们会想生存、会欺骗……你的末日概率不可能为零。（Sebastian Mallaby）", "We only need to be ahead for the next couple of years, because by 2028 we will get to recursive self-improvement... The race is over. —— 我们只需领先未来两三年，因为到 2028 年会出现递归自我改进……比赛就结束了。（Sebastian Mallaby）", "Religion is the lexicon for dealing with something that we find too mysterious to really understand. —— 宗教正是我们用来处理 过于神秘、难以真正理解之物 的语汇。（Sebastian Mallaby）"], "quotes_en": ["These machines will be smarter than us. They will want to survive and they can be deceptive... your probability of doom cannot be zero. (Sebastian Mallaby)", "We only need to be ahead for the next couple of years, because by 2028 we will get to recursive self-improvement... The race is over. (Sebastian Mallaby)", "Religion is the lexicon for dealing with something that we find too mysterious to really understand. (Sebastian Mallaby)"], "data": ["新书《The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence》（Sebastian Mallaby，2026）。", "采访规模：100+ AI 一线研究者/创始人/投资人。", "关键时点假设：2028 年前后或现递归自我改进（嘉宾转述某实验室负责人判断）。", "历史交易：Google 约 6.5 亿美元收购 DeepMind（2014）。", "嘉宾履历：CFR 高级研究员、两届普利策入围、《More Money Than God》《The Power Law》作者。"], "data_en": ["New book: The Infinity Machine: Demis Hassabis, DeepMind, and the Quest for Superintelligence (Sebastian Mallaby, 2026).", "Interview scale: 100+ frontline AI researchers/founders/investors.", "Key timeline hypothesis: recursive self-improvement around 2028 (guest relaying one lab boss's view).", "Historic deal: Google acquired DeepMind for ~$650M (2014).", "Guest CV: CFR senior fellow, two-time Pulitzer finalist, author of More Money Than God and The Power Law."], "note": ""}, {"id": "2026-06-18-mfm-lifestyle-as-business-100m-life", "podcast": "My First Million", "tier": "A", "category": "创始人/商业", "title": "We Decoded the Business Behind This Influencer's Perfect Life (EP 835)", "guest": "无外部嘉宾（Sam Parr & Shaan Puri 双主持对谈）", "guest_en": "No outside guest (hosts Sam Parr & Shaan Puri in conversation)", "host": "Sam Parr & Shaan Puri", "date": "2026-06-18", "durationMin": null, "worthScore": 3, "worthReason": "一期偏 生活方式经营 + 个人系统 的双主持漫谈：把网红 完美生活 拆成可复制的商业机制，并端出 Sam 像经营 1 亿美元公司一样经营人生 的框架。实战、轻松、有金句，但深度与稀缺性一般，适合通勤随听找灵感。", "worthReason_en": "A hosts-only riff on lifestyle-as-business and personal systems: it reverse-engineers an influencer's perfect life into a repeatable business mechanism and lays out Sam's framework for running your life like a $100M company. Practical, light and quotable, but limited in depth and exclusivity, good commute listening for inspiration.", "originalUrl": "https://www.mfmpod.com/we-decoded-the-business-behind-this-influencers-perfect-life/", "transcriptUrl": "", "noteFile": "", "status": "done", "tldr": "Sam Parr 与 Shaan Puri 这一期把 看起来生活完美的网红 当案例，拆解其背后的商业机器——所谓 escape aesthetics（逃离式美学）如何被打包成可变现的生活方式生意；并延伸到 Sam 像经营一家 1 亿美元公司一样经营自己人生 的方法，以及 清晰的措辞=清晰的思考 等个人操作系统。", "tldr_en": "Sam Parr and Shaan Puri take the perfect-looking influencer as a case study, decoding the business machine behind it, how escape aesthetics gets packaged into a monetizable lifestyle business, and extend to Sam's method of running your life like a $100M company, plus personal-OS rules like clear words equal clear thinking.", "detail": "这是 My First Million 第 835 期，Sam Parr 与 Shaan Puri 没有外部嘉宾，做了一期 生活方式即生意 + 个人系统 的漫谈。开场的钩子是 escape aesthetics（逃离式美学）：那些在社交媒体上贩卖 完美生活 的网红，其 生活 本身就是产品——风景、慢节奏、自由感被精心设计成可复制的内容母题，再通过课程、社群、品牌合作变现。两位主持的拿手好戏，就是把这种看似只是 羡慕对象 的现象，逆向拆成具体的获客—内容—变现链条。\n\n中段他们把镜头转向自己，端出 Sam 反复推崇的框架：像经营一家 1 亿美元公司一样经营你的人生。意思是把个人的时间、精力、健康、关系当成一家公司的资源去配置——有明确目标、有取舍、有 季度复盘，而不是随波逐流。配套的是几条个人操作系统级别的小法则：借《48 Laws of Power》第 25 条 重塑自我（Recreate Yourself）谈主动设计身份；用 Your Word Is Your Wand（你的话语就是你的魔杖）强调语言对现实的塑造力；以及 措辞不清=思考不清——把模糊的表达当成思维漏洞的信号。\n\n后半段是较松散的几段闲聊：从 美国如何让来看世界杯的游客感到惊艳，到 the game of more（追逐更多的游戏）——警惕把人生过成无止境的加法，再到 no hedging（不要骑墙），鼓励在判断与表达上敢于下注、不打太极。\n\n需要说明立场：这期属于 MFM 的 双主持漫谈 类型，信息密度与嘉宾稀缺性都不如其访谈期，更多是灵感与口号级的启发，而非可严格验证的商业案例研究；其中 像经营公司一样经营人生、话语塑造现实 等说法偏自我提升口吻，听时宜取其框架、略其鸡汤。\n\n为什么值得一听：作为通勤随听，它提供了两样东西——一是 把别人的完美生活当商业模式拆解 的视角训练，二是一套把个人生活当系统来管理的轻量框架，适合用来反思自己的时间与注意力配置。", "detail_en": "This is My First Million #835, a hosts-only riff by Sam Parr and Shaan Puri on lifestyle-as-business and personal systems. The opening hook is escape aesthetics: influencers selling a perfect life on social media whose life itself is the product, scenery, slow pace and a sense of freedom carefully designed into a repeatable content motif, then monetized through courses, communities and brand deals. The hosts' specialty is taking what looks like a mere object of envy and reverse-engineering it into a concrete acquisition-content-monetization chain.\n\nMidway they turn the camera on themselves and present Sam's favorite framework: run your life like a $100M company. That m
