tand the medium-term transmission to oil/shipping/risk.", "Controlling a chokepoint can be a cheaper, more credible deterrent than a nuclear weapon — to see why a state might forgo the nuclear option, look at the non-nuclear leverage it holds.", "Bring the adversary’s “losses” into negotiation analysis: often the costs already paid, not the remaining leverage, decide whether it will sit down.", "Hold an expert’s geopolitical read as a “hypothesis”: events are still unfolding, so one expert’s view of internal power and great-power ties is reference, not verdict."], "quotes": ["An honest accounting of what Iran has lost — and why those losses, not just its leverage, are driving Tehran to the negotiating table. —— 对伊朗究竟失去了什么的诚实清算——以及为何是这些损失、而非仅仅是它的筹码，正把德黑兰推向谈判桌。（Hidden Forces 节目简介）", "A new Middle Eastern order… defined less by competing visions than by fluid, transactional balance-of-power dynamics. —— 一个新的中东秩序……与其说由相互竞争的愿景定义，不如说由流动、交易性的均势动态主导。（Hidden Forces 节目简介）"], "quotes_en": ["An honest accounting of what Iran has lost — and why those losses, not just its leverage, are driving Tehran to the negotiating table. (Hidden Forces episode description)", "A new Middle Eastern order… defined less by competing visions than by fluid, transactional balance-of-power dynamics. (Hidden Forces episode description)"], "data": ["Hidden Forces 第 483 期；录制 2026-06-17，主源发布约 2026-06-18。", "嘉宾 Hamidreza Azizi：柏林 SWP 客座研究员、多哈中东全球事务委员会非常驻研究员，著有《The Axis of Resistance》。", "关键事件节点：哈梅内伊遇刺、IRGC 集权、美伊谅解备忘录（MoU）。", "结构性变量：霍尔木兹海峡控制权、黎巴嫩/真主党、可能的美国战略收缩、中伊合作。", "嘉宾给出三种可能让当前和平进程破裂的情景（细节见付费全文）。"], "data_en": ["Hidden Forces episode 483; recorded 2026-06-17, main feed published ~2026-06-18.", "Guest Hamidreza Azizi: SWP Berlin Visiting Fellow, Nonresident Fellow at the Middle East Council on Global Affairs (Doha); author of The Axis of Resistance.", "Key event nodes: Khamenei’s assassination, IRGC consolidation, the US–Iran MoU.", "Structural variables: control of the Strait of Hormuz, Lebanon/Hezbollah, possible US strategic retrenchment, China–Iran cooperation.", "The guest lays out three scenarios that could collapse the current peace process (details behind the paywall)."], "note": ""}, {"id": "2026-06-22-econtalk-auerswald-phone-cow", "podcast": "EconTalk", "tier": "A", "category": "人物访谈", "title": "Can a Phone Be a Cow? (with Philip Auerswald)", "guest": "Philip Auerswald（乔治梅森大学经济学家，新书《A Phone Is a Cow: How Pioneers of the Mobile Revolution Helped Millions Lift Themselves Out of Poverty》作者）", "guest_en": "Philip Auerswald (economist at George Mason University; author of A Phone Is a Cow: How Pioneers of the Mobile Revolution Helped Millions Lift Themselves Out of Poverty)", "host": "Russ Roberts", "date": "2026-06-22", "durationMin": null, "worthScore": 4, "worthReason": "全新收录频道。顶级思想访谈节目用一个绝妙意象（“手机能不能是一头牛”）讲清发展经济学的核心：技术的意义不在发明，而在抵达大多数人。沿途串起 Grameenphone、Nordhaus 照明成本、Schumpeter 新组合，并直击“人类进步是必然、还是取决于少数非凡个体”这一大哉问。长青、跨学科、可迁移，4 星。", "worthReason_en": "A brand-new channel. A top-tier ideas-interview show uses a brilliant image (“can a phone be a cow?”) to nail the core of development economics: technology matters not for being invented but for reaching the majority. It threads together Grameenphone, Nordhaus’s cost of light and Schumpeter’s “new combinations,” and confronts the big question — is human progress inevitable, or does it depend on a few remarkable individuals. Evergreen, interdisciplinary, transferable; 4 stars.", "originalUrl": "https://www.econtalk.org/can-a-phone-be-a-cow-with-philip-auerswald/", "transcriptUrl": "https://www.econtalk.org/can-a-phone-be-a-cow-with-philip-auerswald/", "noteFile": "", "status": "done", "tldr": "Russ Roberts 的 EconTalk 请来乔治梅森经济学家 Philip Auerswald，借新书《A Phone Is a Cow》讲一个反直觉的发展经济学：在 1990 年代孟加拉，手机不是消费奢侈品，而是像一头牛那样的“生产性资产”。沿着 Grameenphone 创始人 Iqbal Quadir 的“连接即生产力”，他追问技术进步到底是必然，还是取决于少数非凡个体——结论是两者同时为真。", "tldr_en": "Russ Roberts’s EconTalk hosts GMU economist Philip Auerswald on his new book A Phone Is a Cow for a counterintuitive development economics: in 1990s Bangladesh a phone wasn’t a consumer luxury but a productive asset, like a cow. Following Grameenphone founder Iqbal Quadir’s “connectivity is productivity,” he asks whether progress is inevitable or depends on a few remarkable individuals — and concludes both are true at once.", "detail": "这是 Russ Roberts 的 EconTalk，嘉宾是乔治梅森大学经济学家 Philip Auerswald，主题是他的新书《A Phone Is a Cow》（录制于 5/26，发布于 6/22；页面含分段逐字稿，覆盖前约 58 分钟）。这是一档以高密度思想对谈著称的顶级访谈节目，本次为全新收录频道。\n\n书名来自 Grameenphone 创始人 Iqbal Quadir 的核心洞见：在 1990 年代中期的孟加拉（人均年收入约 400 美元，几乎等于一部手机的价格），手机不该被当成西方眼里的消费/奢侈品，而应像 Grameen Bank 借钱给村妇买一头“牛”那样——是一项能产生收入、自我偿还的生产性资产。Quadir 的口号是“连接即生产力（connectivity is productivity）”：在穷国，一部电话节省的时间就是钱，能做价格发现、谈生意，更成为此前对农村穷人根本不存在的服务（如移动金融）的交付平台。Auerswald 的大论点是：人类进步的关键，不只是发明技术，而是把技术带给世界上的大多数人——而固定电话从未接近覆盖全球多数人口，移动电话做到了。今天孟加拉的手机比人还多。\n\n他把“谁该为移动革命负责”讲成一条迷人的长链：从在费城 1876 年世博会首秀电话的贝尔，到“几乎无人知晓”的蜂窝设想者 D.H. Ring、1945 年 7 月在《周六晚邮报》预言移动电话的官僚 E.K. Jett（同月 Vannevar Bush 发表《As We May Think》预言互联网），再到打出第一通手机电话的 Marty Cooper。他还引入两把跨学科的钥匙：经济学家 William Nordhaus 那篇用“获得照明需要付出多少人类劳动”来衡量进步的著名论文（从百万年前的木火，到捕鲸取油点街灯，再到电气化——后者还是一次伦理上的进步），以及 Schumpeter 早在 1911 年就提出的“创新即新组合（new combinations）”和 Kauffman 的“相邻可能（adjacent possible）”。\n\n全篇真正的“大哉问”是 Auerswald 自称经济学最重要的问题：人类进步有多少是必然的，又有多少取决于少数非凡个体的决心？他把两极归为“必然论（马克思主义）”与“伟人史观（乔布斯、Quadir、香农）”，并引托尔斯泰《战争与和平》第二尾声。他的结论是：两者同时为真——既有被基本预定的、组合式的演进路径，也有真正改变历史的个体值得被铭记；Russ 的补充更精到：未必是我们没有控制力，而是激励太强、终将胜出，个体决定的更多是“速度”。这与哈耶克的自发秩序、摩尔定律“看似命中注定、实则可被错误立法轻易扼杀”一脉相承。一句营销味十足却发人深省的话：“我们太常把高净值与真正的影响力（net impact）混为一谈。”", "detail_en": "This is Russ Roberts’s EconTalk with George Mason University economist Philip Auerswald on his new book A Phone Is a Cow (recorded 5/26, published 6/22; the page has a segmented transcript covering roughly the first ~58 minutes). It’s a top-tier ideas-conversation show, and a brand-new channel for the tracker.\n\nThe title comes from Grameenphone founder Iqbal Quadir’s core insight: in mid-1990s Bangladesh (per-capita income ~$400/yr, about the price of a handset), a phone shouldn’t be seen as a Western consumer/luxury good but, like Grameen Bank lending a village woman money to buy a “cow,” as a productive, income-generating, self-repaying asset. Quadir’s slogan: “connectivity is productivity.” In a poor country, the time a phone saves is money — enabling price discovery, deal-making, and becoming a delivery platform for services (like mobile finance) that simply didn’t exist for the rural poor. Auerswald’s larger argument: human progress hinges not only on inventing technology but on bringing it to the majority of the world — landlines never came close to covering most of humanity; mobile did. Today Bangladesh has more phones than people.\n\nHe turns “who is responsible for the mobile revolution” into a fascinating chain: from Bell debuting the telephone at the 1876 Centennial Exposition in Philadelphia, to the “known to absolutely nobody” cellular visionary D.H. Ring, to bureaucrat E.K. Jett who foresaw mobile telephony in a July 1945 Saturday Evening Post piece (the same month Vannevar Bush published “As We May Think” anticipating the internet), to Marty Cooper who made the first mobile call. He brings in two interdisciplinary keys: William Nordhaus’s famous paper measuring progress by “how much human labor it takes to obtain light” (from wood fire a million years ago, to killing whales for oil to light streets, to electrification — the last also an ethical advance), and Schumpeter’s 1911 “innovation as new combinations” plus Kauffman’s “adjacent possible.”\n\nThe real big question is what Auerswald calls economics’ most important: how much of human progress is inevitable, and how much depends on the determination of remarkable individuals? He frames the poles as “inevitability (Marxism)” versus the “Great Man theory (Jobs, Quadir, Shannon),” invoking Tolstoy’s second epilogue to War and Peace. His conclusion: both are true at once — there is a largely predetermined, combinatorial progression and there are individuals who genuinely change history and deserve celebration. Russ’s refinement is sharper: it’s less that we lack control than that incentives are overwhelming and will win out, with individuals mostly setting the speed — kin to Hayek’s emergent order and Moore’s law “looking predestined yet easily killed by the wrong legislation.” A marketing-flavored but resonant line: “we too often confuse high net worth with net impact.”", "points": ["全新收录频道 EconTalk（主持 Russ Roberts），嘉宾乔治梅森经济学家 Philip Auerswald，谈新书《A Phone Is a Cow》；录制 5/26、发布 6/22。", "核心意象：在 1990 年代孟加拉，手机不是消费奢侈品，而是像一头牛那样能产生收入、自我偿还的“生产性资产”（源自 Grameen Bank 的“牛”式微贷模型）。", "关键人物：Grameenphone 创始人 Iqbal Quadir，口号“连接即生产力”；他看的是趋势（成本随摩尔定律下降、收入上升），而非绝对数字。", "大论点：进步的关键不在发明，而在把技术带给大多数人——固定电话从未覆盖全球多数人口，移动电话做到了；今天孟加拉手机比人还多。", "进步度量：引 Nordhaus 的“照明成本”论文——用‘获得光需要多少人类劳动’衡量进步，且进步是一连串完全不同技术的更替（木火→鲸油→电气化）。", "创新理论：Schumpeter 1911 年“创新即新组合”，叠加 Kauffman 的“相邻可能”——组合空间超指数级，所以必须‘选一条路’。", "大哉问：人类进步有多少是必然、有多少取决于少数非凡个体（必然论 vs 伟人史观，引托尔斯泰）。", "结论：两者同时为真；Russ 补充——激励太强终将胜出，个体更多决定‘速度’，呼应哈耶克自发秩序与摩尔定律。", "金句式洞见：‘我们太常把高净值与真正的影响力（net impact）混为一谈。’"], "points_en": ["Brand-new channel EconTalk (host Russ Roberts), guest GMU economist Philip Auerswald on his new book A Phone Is a Cow; recorded 5/26, published 6/22.", "Core image: in 1990s Bangladesh a phone wasn’t a consumer luxury but, like a cow, a productive, income-generating, self-repaying asset (from Grameen Bank’s “cow” microloan model).", "Key figure: Grameenphone founder Iqbal Quadir, slogan “connectivity is productivity”; he watched the trend (costs falling with Moore’s law, incomes rising), not the absolute number.", "Big argument: progress hinges not on invention but on bringing technology to the majority — landlines never covered most of humanity; mobile did; today Bangladesh has more phones than people.", "Measure of progress: Nordhaus’s “cost of light” paper — gauge progress by how much human labor it takes to obtain light, and progress is a succession of entirely different technologies (wood fire → whale oil → electrification).", "Innovation theory: Schumpeter’s 1911 “innovation as new combinations,” plus Kauffman’s “adjacent possible” — the combinatorial space is hyper-exponential, so you must choose a path.", "The big question: how much of progress is inevitable vs. dependent on a few remarkable individuals (inevitability vs. Great Man theory, invoking Tolstoy).", "Conclusion: both true at once; Russ adds — incentives are overwhelming and will win out, individuals mainly set the speed, echoing Hayek’s emergent order and Moore’s law.", "Quotable insight: “we too often confuse high net worth with net impact.”"], "takeaways": ["判断一项技术的真正价值，别只看“是否被发明”，而看“是否抵达了大多数人”——抵达，往往比发明更难也更重要。", "把工具当‘生产性资产’而非‘消费’来想：买一样东西前问，它能不能像那头牛一样为你产生回报、自我偿还。", "看长期趋势而非当下绝对值：Quadir 在收入≈手机价时就下注，因为他算的是成本/收入曲线的交叉，而非此刻贵不贵。", "面对‘是时势还是英雄’的争论，answer 是‘都对’：顺着强激励的大势走，同时承认个体能显著改变它的速度——这对个人选择同样适用。"], "takeaways_en": ["To judge a technology’s real value, look not at “was it invented” but “did it reach the majority” — reaching is often harder and more important than inventing.", "Think of tools as productive assets, not consumption: before buying something, ask whether it can, like that cow, generate a return and repay itself.", "Watch the long-run trend, not today’s absolute number: Quadir bet when income ≈ handset price because he computed the crossing of the cost/income curves, not whether it was pricey now.", "On the “forces vs. heroes” debate, the answer is “both”: ride the strong-incentive tide while acknowledging individuals can markedly change its speed — true for personal choices too."], "quotes": ["A phone could be a cow. A phone was essentially a productive asset, and not, as it really was seen in the West at the time, a consumption good, a luxury good. —— 手机可以是一头牛。它本质上是一项生产性资产，而不是当时西方眼中的消费品、奢侈品。（Philip Auerswald）", "It's both, it's just both… We have entrepreneurial initiative, we have free will, and we exist in a world in which a lot is predetermined. —— 两者皆是，就是两者皆是……我们有创业的能动性、有自由意志，同时又活在一个许多事早已被预定的世界里。（Philip Auerswald）", "We too often confuse high net worth with net impact. —— 我们太常把‘高净值’与真正的‘影响力’混为一谈。（Philip Auerswald）"], "quotes_en": ["A phone could be a cow. A phone was essentially a productive asset, and not, as it really was seen in the West at the time, a consumption good, a luxury good. (Philip Auerswald)", "It's both, it's just both… We have entrepreneurial initiative, we have free will, and we exist in a world in which a lot is predetermined. (Philip Auerswald)", "We too often confuse high net worth with net impact. (Philip Auerswald)"], "data": ["录制 2026-05-26，发布 2026-06-22；页面含分段逐字稿，覆盖前约 58 分钟。", "1990 年代中期孟加拉人均年收入约 400 美元 ≈ 一部手机价格；今天孟加拉手机比人还多。", "更早的麦金塔生意：Mac 约 4000 美元 vs 人均收入约 200 美元 ≈ 20:1。", "Nordhaus 照明成本论文：NBER，1994 年 1 月，数据回溯至约公元前 100 万年。", "E.K. Jett 1945 年 7 月在《周六晚邮报》预言移动电话；同月 Vannevar Bush 发表《As We May Think》。"], "data_en": ["Recorded 2026-05-26, published 2026-06-22; the page has a segmented transcript covering ~the first 58 minutes.", "Mid-1990s Bangladesh per-capita income ~$400/yr ≈ the price of a handset; today Bangladesh has more phones than people.", "Earlier Macintosh venture: a Mac ~$4,000 vs per-capita income ~$200 ≈ 20:1.", "Nordhaus’s cost-of-light paper: NBER, January 1994, with data back to ~1,000,000 B.C.", "E.K. Jett foresaw mobile telephony in the Saturday Evening Post, July 1945 — the same month as Vannevar Bush’s ‘As We May Think.’"], "note": ""}, {"id": "2026-06-21-acquired-disney-walt-era", "podcast": "Acquired", "tier": "S", "category": "创始人/商业", "title": "The Walt Disney Company (Walt's Era: The Birth of the Flywheel)", "guest": "无外部嘉宾（Ben Gilbert 与 David Rosenthal 双主持史诗级拆解）", "guest_en": "No outside guest (epic deep-dive by hosts Ben Gilbert & David Rosenthal)", "host": "Ben Gilbert & David Rosenthal", "date": "2026-06-21", "durationMin": null, "worthScore": 5, "worthReason": "Acquired 旗舰级公司史诗，把迪士尼意外发明的 IP 飞轮讲透——艺术、商业与工程的极致联姻，长青价值极高。", "worthReason_en": "An Acquired flagship company epic that nails how Disney accidentally invented the IP flywheel — the ultimate marriage of art, commerce and engineering, with very high evergreen value.", "originalUrl": "https://www.acquired.fm/episodes/the-walt-disney-company", "transcriptUrl": "https://library.acquired.fm/episodes/the-walt-disney-company.pdf", "noteFile": "", "status": "done", "tldr": "Acquired 用一整集讲 Walt Disney 时代：一个两度破产的堪萨斯城动画师，靠一次次押上全公司，意外造出了把电影、电视、主题公园、衍生品和音乐互相喂养的现代“飞轮”商业模式。", "tldr_en": "Acquired devotes a full episode to Walt's era: how a twice-bankrupt Kansas City animator, by betting the whole company over and over, accidentally built the modern flywheel that feeds film, TV, theme parks, merchandise and music into one another.", "detail": "本集聚焦“Walt 时代”，主线是一个反直觉命题：迪士尼今天看似稳健可预测的现金机器，恰恰诞生于 Walt 把公司当“失控的登月工厂”一次次孤注一掷的疯狂期。Ben 与 David 从 Walt 早年两度创业失败、丢掉自创角色 Oswald the Lucky Rabbit（被发行商挖走团队）讲起——正是这次惨败逼出了与 Ub Iwerks 合作的 Mickey Mouse，以及 1928 年第一部同步声音卡通《Steamboat Willie》。\n随后是连续的“押上全部身家”：1937 年的《Snow White》是史上第一部长篇动画电影，业内嘲讽为“迪士尼的蠢事”，却成为里程碑；为追求画面纵深，工作室自研 multiplane camera；Walt 把对模型火车的痴迷外化成 1955 年的 Disneyland。每一步都把上一笔利润再赌进下一个看似疯狂的项目。\n全集真正的“认知钩子”是飞轮：主持人引用 1958 年《华尔街日报》刊出的迪士尼内部图（本集 show notes 与官方配套 PDF 均收录），那张图显示电影、电视节目、主题公园、出版/音乐与消费品如何彼此导流、互为广告——这就是后来被无数公司奉为圣经的“flywheel”模型，而它在迪士尼是被“意外”长出来的，而非顶层设计。\n本集也不回避张力：1941 年的动画师大罢工、Walt 高度集权与控制欲、把部分资产放进个人公司（Retlaw）、以及 Disneyland 早期资金捉襟见肘（连酒店都不归迪士尼所有）。为何重要：它给“IP × 体验 × 商品”如何复利提供了原型，对今天任何想做内容飞轮、平台生态或长青品牌的人，都是可迁移的底层教材。", "detail_en": "The episode zeroes in on Walt's era around a counterintuitive thesis: Disney's seemingly stable, predictable cash machine today was born precisely from the period when Walt ran the company like an unhinged moonshot factory, betting it all over and over. Ben and David start with Walt's two early failed ventures and the loss of his own creation, Oswald the Lucky Rabbit (whose team was poached by his distributor) — the very disaster that forced the creation of Mickey Mouse with Ub Iwerks and the first synchronized-sound cartoon, Steamboat Willie (1928).\nThen come the serial bet-the-company moves: 1937's Snow White, the first feature-length animated film, mocked in the industry as 'Disney's Folly,' became a landmark; to get depth on screen the studio invented the multiplane camera; and Walt turned his obsession with model trains into Disneyland in 1955. Each step plowed the last profit into the next seemingly crazy project.\nThe episode's real cognitive hook is the flywheel: the hosts cite the 1958 Wall Street Journal internal Disney diagram (included in the show notes and official PDF companion) showing how films, TV, theme parks, publishing/music and consumer products feed and advertise each other — the 'flywheel' model later treated as gospel by countless companies, which at Disney grew accidentally rather than by top-down design.\nIt doesn't shy from tension either: the 1941 animators' strike, Walt's intense control, parking assets in his personal company (Retlaw), and Disneyland's shaky early financing (even the hotel wasn't Disney-owned). Why it matters: it provides the prototype for how IP x experience x merchandise compounds, a transferable foundation for anyone building a content flywheel, platform ecosystem or evergreen brand today.", "points": ["“Walt 时代”的核心反差：今天稳健的迪士尼，是当年把公司当登月工厂、不断 all-in 的产物——稳定来自一连串疯狂赌注的幸存。", "起点是失败：Walt 早年两度创业破产、被发行商夺走自创角色 Oswald，逼出了与 Ub Iwerks 合作的 Mickey Mouse。", "1928 年《Steamboat Willie》是第一部同步声音卡通，用“声音”这一新技术做差异化，奠定迪士尼的技术领先基因。", "1937 年《Snow White》是史上首部长篇动画，被讥为“迪士尼的蠢事”，却押对了——证明把全部资源压在一次豪赌上的回报。", "为画面纵深自研 multiplane camera；这种“为艺术不计成本的工程”是迪士尼护城河的来源之一。", "Disneyland（1955）源自 Walt 对模型火车的个人痴迷，是把“体验”接入内容飞轮的关键一跃。", "飞轮模型的物证：1958 年《华尔街日报》登出的迪士尼内部图，显示电影/电视/乐园/商品/音乐互相导流、互为广告。", "本集明确标注张力：1941 动画师大罢工、Walt 的高度集权、Retlaw 个人持股、Disneyland 早期连酒店都不归迪士尼。", "为何重要：这是“IP × 体验 × 商品”复利的原型课，对今天做内容生态/长青品牌的人极具迁移价值。"], "points_en": ["The core contrast of 'Walt's era': today's stable Disney is the product of a moonshot-factory phase of relentless all-in bets — stability as the survivor of a string of crazy gambles.", "It starts with failure: Walt's two early bankruptcies and the loss of his own character Oswald to his distributor forced the creation of Mickey Mouse with Ub Iwerks.", "1928's Steamboat Willie was the first synchronized-sound cartoon, using the new technology of sound to differentiate and seeding Disney's tech-leadership gene.", "1937's Snow White, the first feature-length animated film, was mocked as 'Disney's Folly' yet paid off — proof of the return on betting everything on one big swing.", "The studio invented the multiplane camera for on-screen depth; this 'engineering for art at any cost' is one source of Disney's moat.", "Disneyland (1955) grew out of Walt's personal obsession with model trains — the pivotal leap that plugged 'experience' into the content flywheel.", "Physical proof of the flywheel: the 1958 Wall Street Journal Disney internal diagram showing film/TV/parks/merchandise/music feeding and advertising one another.", "The episode flags the tension: the 1941 animators' strike, Walt's intense control, the Retlaw personal stake, and Disneyland's early days when even the hotel wasn't Disney-owned.", "Why it matters: it is the prototype lesson in how IP x experience x merchandise compounds — highly transferable for anyone building content ecosystems or evergreen brands today."], "takeaways": ["复利的不是某个产品，而是“互相导流的系统”：单点再强，也不如让各业务彼此喂养的飞轮。", "伟大常诞生于被逼到墙角时：丢掉 Oswald 才有 Mickey——把损失当成强制创新的契机。", "为质量不计成本，长期看是护城河而非浪费（multiplane camera、Snow White）。", "个人热爱可以是事业的种子（Walt 的火车 → Disneyland），但要警惕过度集权与公私资产混同的治理风险。"], "takeaways_en": ["What compounds is not a single product but a system that cross-feeds: even a strong point solution loses to a flywheel where businesses advertise each other.", "Greatness is often born when cornered: losing Oswald gave us Mickey — treat loss as forced-innovation fuel.", "Spending on quality looks like waste short-term but is a long-term moat (multiplane camera, Snow White).", "Personal passion can seed a business (Walt's trains to Disneyland), but watch the governance risk of over-centralization and mixing personal and corporate assets."], "quotes": ["I only hope that we never lose sight of one thing — that it was all started by a mouse. —— 我只希望我们永远别忘了一件事：这一切都是从一只老鼠开始的。（Walt Disney）", "We don't make movies to make money, we make money to make more movies. —— 我们不是为了赚钱而拍电影，而是为了拍更多电影去赚钱。（Walt Disney）"], "quotes_en": ["I only hope that we never lose sight of one thing — that it was all started by a mouse. (Walt Disney)", "We don't make movies to make money, we make money to make more movies. (Walt Disney)"], "data": ["《Steamboat Willie》1928 年上映，是第一部同步声音卡通，捧红 Mickey Mouse。", "《Snow White and the Seven Dwarfs》1937 年上映，是史上第一部长篇动画电影，业内戏称“Disney's Folly”。", "Disneyland 于 1955 年开园，灵感部分来自 Walt 对 model trains 的痴迷。", "1958 年《华尔街日报》刊出迪士尼内部“飞轮”图，展示电影/电视/乐园/出版/商品如何互相导流（本集官方 PDF 配套收录）。", "本集为 Acquired 春季 2026 第 4 集（Sp26 E4），官方提供配套 PDF 与 transcript。"], "data_en": ["Steamboat Willie (1928) was the first synchronized-sound cartoon and launched Mickey Mouse.", "Snow White and the Seven Dwarfs (1937) was the first feature-length animated film, dubbed 'Disney's Folly' by the industry.", "Disneyland opened in 1955, inspired partly by Walt's obsession with model trains.", "The 1958 Wall Street Journal published Disney's internal 'flywheel' diagram showing how film/TV/parks/publishing/merchandise feed one another (included in the episode's official PDF companion).", "This is Acquired Spring 2026 Episode 4 (Sp26 E4), with an official PDF companion and transcript."], "note": ""}, {"id": "2026-06-20-founders-joseph-pulitzer", "podcast": "Founders Podcast", "tier": "S", "category": "创始人/商业", "title": "#422 Joseph Pulitzer", "guest": "无嘉宾（David Senra 解读 James McGrath Morris《Pulitzer: A Life in Politics, Print, and Power》）", "guest_en": "No guest (David Senra distills James McGrath Morris's 'Pulitzer: A Life in Politics, Print, and Power')", "host": "David Senra", "date": "2026-06-20", "durationMin": 53, "worthScore": 4, "worthReason": "把一位匈牙利移民如何用偏执、速度与“读者本位”建起报业帝国讲成创业课；长青可迁移，但属书摘式解读、非一手访谈。", "worthReason_en": "Turns how a Hungarian immigrant built a newspaper empire through obsession, speed and a reader-first stance into a founder's masterclass; evergreen and transferable, but a book-distillation rather than a first-hand interview.", "originalUrl": "https://www.founderspodcast.com/episodes/422-joseph-pulitzer", "transcriptUrl": "", "noteFile": "", "status": "done", "tldr": "David Senra 读完 Pulitzer 传记，提炼这位匈牙利移民如何从一文不名到拥有《纽约世界报》：把报纸做成“为普通读者服务”的机器，用煽动性头条、十字军式调查与极致勤奋打赢发行量战争，最后用遗产设立普利策奖。", "tldr_en": "After reading the Pulitzer biography, David Senra distills how this Hungarian immigrant went from penniless to owning the New York World: turning a newspaper into a machine 'in service of the ordinary reader,' winning the circulation war with sensational headlines, crusading investigations and relentless work, and finally endowing the Pulitzer Prizes.", "detail": "本集是 Founders 经典的“读一本传记、提炼一个创始人”的形式，文本依据是 James McGrath Morris 所著《Pulitzer: A Life in Politics, Print, and Power》。Joseph Pulitzer 1847 年生于匈牙利，少年移民美国，南北战争期间在联邦军服役，战后落脚圣路易斯，靠自学英语与法律起步。他先买下濒死的《St. Louis Dispatch》，与《Post》合并成今天仍在的《St. Louis Post-Dispatch》，随后 1883 年从 Jay Gould 手中买下亏损的《New York World》。\n Senra 强调的“创业机器”要点：Pulitzer 把报纸定位为“为普通人服务”的产品——大字头条、插画、煽动性但易读的写法、十字军式的揭黑调查（揭露贪腐、为穷人发声），把发行量从几万做到全美第一。最具传播学意义的一役，是 1885 年他为自由女神像底座众筹：当政府与富人都不肯出钱时，他在《World》上点名募捐，承诺刊登每一位捐款者姓名，最终从十二万多名小额捐款者手中筹得约十万美元——这是“用读者参与换增长”的早期范本。\n本集也包含张力与代价：他与 Hearst《New York Journal》的发行量战争催生了“黄色新闻”（yellow journalism）的恶名，被指煽动了美西战争；他中年几近失明、对噪音极度敏感，在游艇上建“静默之塔”指挥报业；偏执与控制欲伴随终身。最终他用遗嘱向哥伦比亚大学捐资设立新闻学院与普利策奖（1917 年首颁）。为何重要：它示范了“产品为谁而做”如何决定增长引擎，也提醒创始人：同一种偏执，既能造帝国，也会反噬声誉与健康。", "detail_en": "This is Founders' classic 'read one biography, distill one founder' format, based on James McGrath Morris's 'Pulitzer: A Life in Politics, Print, and Power.' Joseph Pulitzer, born in Hungary in 1847, emigrated to the U.S. as a youth, served in the Union Army during the Civil War, settled in St. Louis afterward, and started out teaching himself English and law. He first bought the dying St. Louis Dispatch, merged it with the Post into the still-running St. Louis Post-Dispatch, then in 1883 bought the money-losing New York World from Jay Gould.\nSenra's 'founder-as-machine' points: Pulitzer positioned the paper as a product 'in service of ordinary people' — big headlines, illustrations, sensational but readable prose, and crusading muckraking (exposing corruption, championing the poor) — taking circulation from tens of thousands to the largest in the country. The most media-theory-significant move was his 1885 crowdfunding of the Statue of Liberty pedestal: when government and the rich refused to pay, he solicited donations in the World, promising to print every donor's name, and ultimately raised about $100,000 from more than 120,000 small donors — an early template for 'growth through reader participation.'\nThe episode also carries tension and cost: his circulation war with Hearst's New York Journal spawned the infamy of 'yellow journalism' and was blamed for inflaming the Spanish-American War; in middle age he went nearly blind and grew extremely noise-sensitive, running his empire from a 'Tower of Silence' on his yacht; obsession and control followed him for life. He ultimately endowed Columbia's journalism school and the Pulitzer Prizes via his will (first awarded in 1917). Why it matters: it demonstrates how 'who the product is for' determines the growth engine, and warns founders that the same obsession that builds an empire can also corrode reputation and health.", "points": ["形式说明：Founders 是 Senra 读完一本传记后的提炼解读（本期书源为 McGrath Morris 的 Pulitzer 传），非一手访谈。", "出身极低：匈牙利移民、内战联邦军老兵，靠自学英语和法律在圣路易斯起步——典型“一无所有处起家”。", "起家路径：买下濒死的《St. Louis Dispatch》合并为《Post-Dispatch》，再于 1883 年从 Jay Gould 手里买下亏损的《New York World》。", "增长引擎=读者本位：大字头条+插画+易读煽动写法+揭黑调查，把发行量做到全美第一。", "经典众筹案例：1885 年为自由女神像底座募捐，承诺登出每位捐款人姓名，从 12 万+ 小额捐款者筹得约 10 万美元。", "代价与争议：与 Hearst 的发行量战争催生“黄色新闻”，被指煽动美西战争——增长手段的伦理反噬。", "极端工作方式：中年几近失明、对噪音极敏感，在游艇“静默之塔”里遥控指挥报业。", "长期遗产：遗嘱捐资哥大设新闻学院与普利策奖（1917 首颁），把个人帝国转成公共制度。", "为何重要：示范“为谁做产品”如何决定增长引擎，同时警示偏执的双刃性。"], "points_en": ["Format note: Founders is Senra's distillation after reading a biography (here, McGrath Morris's Pulitzer), not a first-hand interview.", "Humble origins: Hungarian immigrant and Union Army veteran who started out teaching himself English and law in St. Louis — a classic 'from nothing' rise.", "Path to power: bought the dying St. Louis Dispatch and merged it into the Post-Dispatch, then in 1883 bought the money-losing New York World from Jay Gould.", "Growth engine = reader-first: big headlines, illustrations, readable sensational prose and muckraking took circulation to the largest in the country.", "Classic crowdfunding case: the 1885 Statue of Liberty pedestal drive, promising to print every donor's name, raised about $100,000 from 120,000+ small donors.", "Cost and controversy: the circulation war with Hearst spawned 'yellow journalism' and was blamed for inflaming the Spanish-American War — the ethical blowback of growth tactics.", "Extreme work style: nearly blind in middle age and acutely noise-sensitive, he ran the empire from a 'Tower of Silence' on his yacht.", "Lasting legacy: his will endowed Columbia's journalism school and the Pulitzer Prizes (first awarded 1917), converting a personal empire into a public institution.", "Why it matters: it shows how 'who the product is for' sets the growth engine, while warning of the double edge of obsession."], "takeaways": ["想清楚“为谁做产品”，增长引擎自然浮现：Pulitzer 为普通读者做报纸，于是发行量成了护城河。", "把用户变成参与者：自由女神像众筹证明“让读者出现在产品里”能换来病毒式增长与忠诚。", "约束可以变武器：失明没有让 Pulitzer 停下，他重构了工作方式继续指挥——劣势倒逼系统重设计。", "警惕增长手段的伦理成本：黄色新闻带来流量，也带来长期声誉损害——增长别透支信任。"], "takeaways_en": ["Be clear who the product is for and the growth engine emerges: Pulitzer made papers for ordinary readers, so circulation became the moat.", "Turn users into participants: the Statue of Liberty drive proved that putting readers inside the product buys viral growth and loyalty.", "Constraints can become weapons: blindness didn't stop Pulitzer; he redesigned how he worked to keep commanding — a disadvantage forcing a system redesign.", "Mind the ethical cost of growth tactics: yellow journalism brought traffic but lasting reputational damage — don't overdraw trust for growth."], "quotes": ["Our Republic and its press will rise or fall together. —— 我们的共和国与它的新闻业将共荣共损、一起兴亡。（Joseph Pulitzer）", "Put it before them briefly so they will read it, clearly so they will appreciate it, picturesquely so they will remember it and, above all, accurately so they will be guided by its light. —— 简短地呈现，他们才会读；清晰地呈现，他们才会领会；生动地呈现，他们才会记住；最重要的是准确，他们才会被它的光指引。（Joseph Pulitzer）"], "quotes_en": ["Our Republic and its press will rise or fall together. (Joseph Pulitzer)", "Put it before them briefly so they will read it, clearly so they will appreciate it, picturesquely so they will remember it and, above all, accurately so they will be guided by its light. (Joseph Pulitzer)"], "data": ["Joseph Pulitzer 1847 年生于匈牙利，内战期间在美国联邦军服役。", "1878 年买下《St. Louis Dispatch》并合并为《St. Louis Post-Dispatch》（至今仍在）。", "1883 年从 Jay Gould 手中买下亏损的《New York World》，随后做到全美最大发行量。", "1885 年自由女神像底座众筹：从 12 万+ 小额捐款者筹得约 10 万美元。", "普利策奖经其遗嘱设立、由哥伦比亚大学管理，1917 年首次颁发；本集时长约 52 分钟。"], "data_en": ["Joseph Pulitzer was born in Hungary in 1847 and served in the U.S. Union Army during the Civil War.", "In 1878 he bought the St. Louis Dispatch and merged it into the St. Louis Post-Dispatch (still running today).", "In 1883 he bought the money-losing New York World from Jay Gould and built it into the largest circulation in the U.S.", "The 1885 Statue of Liberty pedestal drive raised about $100,000 from more than 120,000 small donors.", "The Pulitzer Prizes were established by his will, administered by Columbia University, first awarded in 1917; this episode runs about 52 minutes."], "note": ""}, {"id": "2026-06-17-cwt-baszucki-roblox", "podcast": "Conversations with Tyler", "tier": "A", "category": "人物访谈", "title": "Dave Baszucki on Roblox, Teen Entrepreneurs, and the Future of Play (Ep. 280)", "guest": "David Baszucki（Roblox 联合创始人/CEO）", "guest_en": "David Baszucki (co-founder & CEO of Roblox)", "host": "Tyler Cowen", "date": "2026-06-17", "durationMin": null, "worthScore": 4, "worthReason": "Roblox CEO 亲述 UGC 虚拟经济、年龄分层安全设计、token 成本骤降如何重塑游戏创作；Tyler 式追问逼出真信息，但部分安全问题回答偏回避。", "worthReason_en": "Roblox's CEO first-hand on its UGC virtual economy, age-banded safety design and how falling token costs reshape game creation; Tyler's sharp questioning extracts real signal, though some safety answers feel evasive.", "originalUrl": "https://conversationswithtyler.com/episodes/dave-baszucki/", "transcriptUrl": "https://conversationswithtyler.com/episodes/dave-baszucki/", "noteFile": "", "status": "done", "tldr": "Roblox CEO Baszucki 向 Tyler Cowen 拆解平台逻辑：内容 100% 由用户创造、靠 Robux 虚拟经济而非广告变现；用 AI 年龄估算做分层通信来守护未成年人；并预言 token 成本暴跌将让创作者用“百万小时模拟测试”迭代游戏。", "tldr_en": "Roblox CEO Baszucki walks Tyler Cowen through the platform's logic: content is 100% user-created, monetized via the Robux virtual economy rather than ads; AI age-estimation enables banded communication to protect minors; and he predicts collapsing token costs will let creators iterate via 'a million hours of simulated testing.'", "detail": "这是一场典型的 Tyler Cowen 高密度追问：嘉宾是 Roblox 联合创始人兼 CEO David Baszucki，话题横跨平台经济、AI、内容安全与发展经济学。Baszucki 先讲清商业模式——Roblox 上的游戏与体验 100% 由用户社区（UGC）创造，绝大多数玩家免费游玩，营收主要来自玩家购买虚拟货币 Robux，创作者再把 Robux 兑现成真钱；广告占比极小，小到“财报电话会上都不单列”。他强调公司“最大的竞争对手是自己的执行力”，因为全球游戏市场约 2000 亿美元，而 Roblox 今年预计 70 亿美元 bookings，仅占 3.5%–4%。\n安全与治理是访谈的硬核部分。面对 Tyler 关于“万能 App 一定会出事”的逼问，Baszucki 坦承平台上确有 12 岁以下用户，但把它当成优势：Roblox 用 AI 年龄估算给几乎所有人定龄，按年龄段限制陌生人通信（12 岁只能和邻近年龄段交流、不能和 19 岁聊），叠加“行业领先文本过滤 + 禁止图片分享”，并主动检测“想把人引流到站外”的精明少年。他把这套定位为“全球健康、安全、适龄数字互动标准”。Tyler 追问 Jon Haidt 的社媒禁令主张，Baszucki 不支持对 13–16 岁“一刀切封禁”，担心他们失去获取世界新闻的渠道；并称尊重各国法律（如澳大利亚、印尼的未成年禁令）。\nAI 部分有真信息量：Roblox 多年前就用 BERT 等小模型做翻译/过滤，让日本创作者的游戏被阿根廷玩家自动以本地语言游玩；他预言 token 成本继续暴跌后，创作者能“5 分钟跑完一百万小时的模拟玩家测试”再迭代。Tyler 还逼出几个尖锐瞬间：Robux 为何不浮动汇率（Baszucki：为给创作者稳定与信任，约 1 Robux≈1 美分，但不排除未来挂钩一篮子货币）、能否站外交易（不鼓励，怕伤害弱势用户）。整体可执行性强，但在“低龄安全”话题上部分回答偏官方、回避。", "detail_en": "This is a classic high-density Tyler Cowen interrogation: the guest is Roblox co-founder and CEO David Baszucki, ranging across platform economics, AI, content safety and development economics. Baszucki first clarifies the business model — games and experiences on Roblox are 100% created by the user community (UGC), the vast majority of players play for free, revenue comes mainly from players buying the virtual currency Robux, and creators cash Robux out for real money; advertising is so small it is 'not even called out on earnings calls.' He stresses the company's 'biggest competitor is its own ability to execute,' since the global gaming market is roughly $200B and Roblox projects $7B in bookings this year, only 3.5%–4%.\nSafety and governance form the hard core of the talk. Pressed by Tyler that an 'everything app' inevitably has bad things happen, Baszucki concedes the platform has under-13 users but frames it as an advantage: Roblox uses AI age-estimation to band almost everyone, restricting stranger communication by age band (a 12-year-old can talk to nearby ages but not a 19-year-old), layered with 'industry-leading text filtering plus no image sharing,' and actively detects savvy teens trying to move others off-platform. He positions this as setting the 'global standard for healthy, safe, age-appropriate digital engagement.' Asked about Jon Haidt's social-media-ban case, Baszucki opposes a blanket ban for 13–16-year-olds, worried they'd lose access to world news, and says he respects each country's laws (e.g., Australia's and Indonesia's under-16 bans).\nThe AI section carries real signal: Roblox adopted small models like BERT years ago for translation/filtering, letting a Japanese creator's game be auto-played in local language in Argentina; he predicts that as token costs keep collapsing, creators could 'run a million hours of simulated-player testing in five minutes' and then iterate. Tyler also draws out sharp moments: why Robux isn't a floating exchange rate (Baszucki: to give creators stability and trust, roughly 1 Robux ≈ 1 cent, though he's open to pegging to a currency basket someday), and whether off-platform trading is allowed (discouraged, to avoid harming vulnerable users). Overall highly actionable, though some answers on child safety lean official and evasive.", "points": ["商业模式：Roblox 内容 100% 由用户创造（UGC），绝大多数玩家免费玩，营收主要靠玩家买 Robux、创作者再兑现成真钱。", "广告极小：小到“财报电话会上都不单列”；早年试过 pre-roll 视频广告后主动撤掉，优先保用户体验。", "市场天花板：全球游戏内容市场约 2000 亿美元，Roblox 今年预计 70 亿美元 bookings，仅占 3.5%–4%，故“最大对手是自己的执行力”。", "安全=护城河：用 AI 年龄估算给几乎所有人定龄，按年龄段限制陌生人通信（12 岁不能和 19 岁聊），并禁止图片分享。", "主动反规避：专门检测“想把人引流到站外分享地址/图片”的精明少年，作为文本过滤与年龄分层的补充。", "对社媒禁令的立场：不支持对 13–16 岁一刀切封禁，担心他们失去获取世界新闻的渠道；同时尊重澳大利亚、印尼等国法律。", "AI 早用且务实：多年前就用 BERT 等小模型做翻译/过滤，实现“日本做的游戏被阿根廷玩家以本地语言自动游玩”。", "token 成本愿景：成本继续暴跌后，创作者可“5 分钟跑完百万小时模拟玩家测试”，大幅加快迭代与质量。", "Robux 不浮动：约 1 Robux≈1 美分，为给创作者稳定与信任；不鼓励站外交易以保护弱势用户。"], "points_en": ["Business model: Roblox content is 100% user-created (UGC), most players play free, and revenue comes mainly from players buying Robux, which creators cash out for real money.", "Ads are tiny: so small they're 'not called out on earnings calls'; an early pre-roll video ad experiment was pulled to protect user experience.", "Market ceiling: the global gaming-content market is ~$200B and Roblox projects $7B in bookings this year, just 3.5%–4%, so 'the biggest competitor is its own execution.'", "Safety as moat: AI age-estimation bands almost everyone, restricting stranger communication by age band (a 12-year-old can't chat with a 19-year-old) and banning image sharing.", "Active anti-evasion: it specifically detects savvy teens trying to move others off-platform to share addresses/images, supplementing text filtering and age banding.", "Stance on social-media bans: opposes a blanket ban for 13–16-year-olds, fearing loss of access to world news, while respecting laws in Australia, Indonesia and others.", "Early, pragmatic AI: years ago it used small models like BERT for translation/filtering, so 'a game built in Japan is auto-played in local language in Argentina.'", "Token-cost vision: as costs keep collapsing, creators could 'run a million hours of simulated-player testing in five minutes,' greatly speeding iteration and quality.", "Robux doesn't float: roughly 1 Robux ≈ 1 cent for creator stability and trust; off-platform trading is discouraged to protect vulnerable users."], "takeaways": ["最好的增长有时是“让用户当创造者”：把平台做成创作者的生意，分成机制比自营内容更可扩展。", "把合规与安全当产品能力，而非成本：年龄估算+分层通信反而成了 Roblox 的差异化护城河。", "成本曲线会改写可能性边界：盯住 token 价格下跌，提前想清楚“成本趋近于零时我能做什么以前做不到的事”。", "面对尖锐质疑，别用官方话术搪塞：本集中安全话题上的回避，提醒你坦诚比公关更能赢得长期信任。"], "takeaways_en": ["The best growth is sometimes 'let users be creators': building the platform as a creators' business scales better than first-party content.", "Treat compliance and safety as a product capability, not a cost: age-estimation plus banded communication became Roblox's differentiating moat.", "Cost curves rewrite the boundary of the possible: watch falling token prices and pre-figure 'what can I do at near-zero cost that I couldn't before.'", "Don't deflect sharp scrutiny with official talking points: the evasiveness on safety here is a reminder that candor wins long-term trust better than PR."], "quotes": ["The main competitor to Roblox is our own ability to execute and build on our vision. —— Roblox 最大的竞争对手，是我们自己执行并实现愿景的能力。（David Baszucki）", "Lower token costs equals more iteration, higher quality, more creativity for the Roblox creators. —— token 成本越低，就意味着 Roblox 创作者能做更多迭代、更高质量、更强创造力。（David Baszucki）", "We want to set the world global standard for healthy, safe, age-appropriate digital engagement. —— 我们想要为健康、安全、适龄的数字互动设立全球标准。（David Baszucki）"], "quotes_en": ["The main competitor to Roblox is our own ability to execute and build on our vision. (David Baszucki)", "Lower token costs equals more iteration, higher quality, more creativity for the Roblox creators. (David Baszucki)", "We want to set the world global standard for healthy, safe, age-appropriate digital engagement. (David Baszucki)"], "data": ["Roblox 日活跃用户已超 1 亿（100M+ DAU）。", "今年预计 bookings 约 70 亿美元；全球游戏内容市场约 2000 亿美元，Roblox 占约 3.5%–4%。", "汇率：约 1 Robux ≈ 1 美分，自创立以来基本稳定。", "广告占比极小，未在财报电话会单列；营收主体是玩家购买 Robux。", "安全机制：AI 年龄估算 + 年龄段通信限制（12 岁不能与 19 岁私聊）+ 禁止图片分享；录制于 2026-05-27。"], "data_en": ["Roblox has over 100 million daily active users (100M+ DAU).", "It projects about $7B in bookings this year; the global gaming-content market is ~$200B, so Roblox is ~3.5%–4%.", "Exchange rate: roughly 1 Robux ≈ 1 cent, largely stable since founding.", "Advertising is a very small share, not broken out on earnings calls; the bulk of revenue is players buying Robux.", "Safety stack: AI age-estimation + age-banded communication (a 12-year-old can't DM a 19-year-old) + no image sharing; recorded 2026-05-27."], "note": ""}, {"id": "2026-06-22-oddlots-grace-shao-china-ai", "podcast": "Odd Lots", "tier": "S", "category": "科技/AI", "title": "Grace Shao on What the World Should Know About Chinese AI", "guest": "Grace Shao（独立 AI 研究者、AI Proem Substack 作者）", "guest_en": "Grace Shao (independent AI researcher, author of the AI Proem Substack)", "host": "Joe Weisenthal & Tracy Alloway", "date": "2026-06-22", "durationMin": 51, "worthScore": 4, "worthReason": "DeepSeek 之后中国 AI 全景：开源模型竞赛、Baidu 全栈化、H200 解禁、真正瓶颈不在数据中心；内行视角、跨地缘，但无公开全文 transcript。", "worthReason_en": "A post-DeepSeek panorama of Chinese AI: the open-source model race, Baidu going full-stack, H200 access loosening, and the real bottleneck not being data centers; insider view across geopolitics, but with no public full transcript.", "originalUrl": "https://omny.fm/shows/odd-lots/grace-shao-on-what-the-world-should-know-about-chinese-ai", "transcriptUrl": "", "noteFile": "", "status": "done", "tldr": "Odd Lots 在香港对话 AI Proem 作者 Grace Shao，盘点 DeepSeek 之后的中国 AI：前沿实验室密集竞争、开源模型迭代、Baidu 等转向“自研芯片+模型+云”的全栈玩家，H200 部分解禁，而真正瓶颈不在数据中心。", "tldr_en": "In Hong Kong, Odd Lots talks with AI Proem author Grace Shao to map post-DeepSeek Chinese AI: dense frontier-lab competition, fast open-source iteration, players like Baidu going full-stack (own chips + models + cloud), partial H200 access, and a real bottleneck that isn't data centers.", "detail": "本期 Odd Lots 在香港录制，嘉宾是独立 AI 研究者、AI Proem Substack 作者 Grace Shao，她被定位为“中国 AI 产业的内行”。（说明：Odd Lots 无公开全文 transcript，本卡片基于节目官方简介与彭博同期报道整理，未引用嘉宾逐字原话。）核心背景是：去年 DeepSeek 发布廉价前沿模型，一度令美股科技股下挫；中国企业此前被封锁最先进芯片，如今获准购买部分 Nvidia H200。\n节目梳理了几条主线：其一，开源模型与前沿实验室竞争——中国多家前沿实验室密集迭代，DeepSeek 在一个越来越拥挤的中国 AI 市场里要重新找定位；其二，全栈化趋势——以 Baidu 为代表的大厂正同时自研芯片、模型与云基础设施，试图把整条价值链握在手里；其三，中国的制造业优势如何外溢到 AI 硬件与部署；其四，真正的瓶颈在哪里——节目明确“剧透：不是数据中心”，暗示算力之外的电力、芯片、人才或落地环节更关键。\n节目还触及消费侧与社会面：调侃“中国大妈是不是真在用 OpenClaw”（消费级 AI 的下沉渗透），以及绕不开的“AI psychosis（AI 引发的心理问题）”。彭博配套报道给了两个可核数据点：一家中国 AI 实验室股价飙升约 170%，催生“赢家-输家”配对交易；中国正计划建立机制评估 AI 对就业市场的影响。为何重要：在美国叙事（SpaceX/OpenAI/Anthropic 抽走天量资本）之外，这期提供了理解“另一极” AI 生态的内行视角——开源、全栈、制造业纵深，以及监管层已开始正视 AI 的就业冲击。", "detail_en": "This Odd Lots episode was recorded in Hong Kong with independent AI researcher and AI Proem Substack author Grace Shao, framed as 'an insider on China's AI industry.' (Note: Odd Lots has no public full transcript; this card is compiled from the official episode description and contemporaneous Bloomberg reporting, with no verbatim guest quotes.) The core backdrop: last year DeepSeek released a cheap frontier model that briefly sent U.S. tech stocks falling; Chinese firms previously locked out of the most advanced chips are now allowed to buy some Nvidia H200s.\nThe episode traces several threads: first, open-source models and frontier-lab competition — multiple Chinese frontier labs iterate intensely, and DeepSeek must re-find its place in an increasingly crowded Chinese AI market; second, the full-stack trend — players like Baidu are simultaneously building their own chips, models and cloud infrastructure to own the whole value chain; third, how China's manufacturing edge spills into AI hardware and deployment; and fourth, where the real bottleneck lies — the show explicitly says 'spoiler: it isn't data centers,' implying power, chips, talent or deployment matter more than raw compute.\nIt also touches the consumer and social side: a joke about whether 'Chinese grandmas are actually using OpenClaw' (consumer-AI penetration reaching down the demographic curve) and the unavoidable topic of 'AI psychosis.' The companion Bloomberg reporting gives two checkable data points: a Chinese AI lab's stock surged about 170%, cementing a 'winner-loser' pair trade; and China plans a mechanism to evaluate AI's impact on the job market. Why it matters: beyond the U.S. narrative (SpaceX/OpenAI/Anthropic vacuuming up vast capital), this episode offers an insider view of the 'other pole' of the AI ecosystem — open-source, full-stack, manufacturing depth — and shows regulators already taking AI's labor impact seriously.", "points": ["取材说明：Odd Lots 无公开全文 transcript，本卡片据官方简介＋彭博同期报道整理，未引用嘉宾逐字原话。", "背景：DeepSeek 去年发布廉价前沿模型，一度令美股科技股下挫，重塑了中国 AI 的叙事。", "芯片松动：中国企业此前被封锁最先进芯片，如今获准购买部分 Nvidia H200。", "全栈化：以 Baidu 为代表的大厂在自研芯片+模型+云基础设施，试图掌控整条价值链。", "竞争格局：多家中国前沿实验室密集迭代，DeepSeek 需在拥挤市场里重新定位。", "瓶颈判断：节目明确“剧透：不是数据中心”——算力之外的电力/芯片/人才/落地更关键。", "消费下沉：以“中国大妈是否在用 OpenClaw”调侃消费级 AI 的渗透深度。", "可核数据：一家中国 AI 实验室股价飙升约 170%，催生赢家-输家配对交易（彭博 6/18）。", "政策信号：中国计划建立机制评估 AI 对就业市场的影响（彭博 6/17）。"], "points_en": ["Sourcing note: Odd Lots has no public full transcript; this card is compiled from the official description plus contemporaneous Bloomberg reporting, with no verbatim guest quotes.", "Backdrop: DeepSeek's cheap frontier model last year briefly sent U.S. tech stocks falling, reshaping the Chinese AI narrative.", "Chip loosening: Chinese firms previously locked out of the most advanced chips can now buy some Nvidia H200s.", "Full-stack: players like Baidu are building their own chips + models + cloud to own the whole value chain.", "Competitive landscape: multiple Chinese frontier labs iterate intensely, and DeepSeek must re-find its place in a crowded market.", "Bottleneck call: the show explicitly says 'spoiler: it isn't data centers' — power/chips/talent/deployment matter more than raw compute.", "Consumer reach: a joke about whether 'Chinese grandmas are using OpenClaw' gauges how deep consumer AI has penetrated.", "Checkable data: a Chinese AI lab's stock surged ~170%, cementing a winner-loser pair trade (Bloomberg, 6/18).", "Policy signal: China plans a mechanism to evaluate AI's impact on the job market (Bloomberg, 6/17)."], "takeaways": ["别用单极视角看 AI：开源+全栈+制造业纵深的“中国路线”，与美国的资本驱动路线是两套逻辑，都要纳入认知。", "盯瓶颈而非盯口号：当所有人都在喊“算力为王”，真正的约束往往在电力、芯片、人才与落地——找错瓶颈会押错赌注。", "把监管当先行指标：当一国开始正式评估 AI 的就业冲击，说明产业已进入“后果显现期”，对就业与配置都有信号意义。", "警惕“配对交易”式追逐：赢家股价飙 170%、输家被抛弃的行情，既是机会也是拥挤交易的风险标志。"], "takeaways_en": ["Don't view AI through a single pole: the 'China route' of open-source + full-stack + manufacturing depth is a different logic from the U.S. capital-driven route, and both belong in your map.", "Watch the bottleneck, not the slogan: when everyone shouts 'compute is king,' the real constraint is often power, chips, talent and deployment — misidentifying it means misplacing bets.", "Treat regulation as a leading indicator: when a country formally evaluates AI's labor impact, the industry has entered a 'consequences-visible' phase, with signal for jobs and allocation.", "Beware 'pair-trade' chasing: a winner up 170% while losers are dumped is both an opportunity and a marker of crowded-trade risk."], "quotes": ["where bottlenecks exist right now (spoiler: it isn't data centers) —— 当前真正的瓶颈在哪里（剧透：不是数据中心）。（Odd Lots 节目官方简介）", "many of the big Chinese tech companies — like Baidu — are making a push to become full-stack players, with their own chips, models, and cloud infrastructure —— 不少中国科技巨头（如百度）正全力转向全栈玩家：自研芯片、模型与云基础设施。（Odd Lots 节目官方简介）"], "quotes_en": ["where bottlenecks exist right now (spoiler: it isn't data centers). (Odd Lots official episode description)", "many of the big Chinese tech companies — like Baidu — are making a push to become full-stack players, with their own chips, models, and cloud infrastructure. (Odd Lots official episode description)"], "data": ["去年 DeepSeek 发布廉价前沿模型，一度令美股科技股下挫。", "中国企业获准购买部分 Nvidia H200（此前最先进芯片被封锁）。", "彭博 6/18：某中国 AI 实验室股价飙升约 170%，催生赢家-输家配对交易。", "彭博 6/17：中国计划建立机制评估 AI 对就业市场的影响。", "节目时长约 51 分钟，录制于香港；嘉宾为 AI Proem 作者 Grace Shao。"], "data_en": ["Last year DeepSeek released a cheap frontier model that briefly sent U.S. tech stocks falling.", "Chinese firms are now allowed to buy some Nvidia H200s (the most advanced chips were previously blocked).", "Bloomberg, 6/18: a Chinese AI lab's stock surged ~170%, cementing a winner-loser pair trade.", "Bloomberg, 6/17: China plans a mechanism to evaluate AI's impact on the job market.", "The episode runs about 51 minutes, recorded in Hong Kong; the guest is AI Proem author Grace Shao."], "note": ""}, {"id": "2026-06-18-mib-seth-klarman", "podcast": "Masters in Business", "tier": "A", "category": "财经/投资", "title": "Seth Klarman, The Baupost Group (Value Investing Legend)", "guest": "Seth Klarman（Baupost Group 创始人/CEO，《Margin of Safety》作者）", "guest_en": "Seth Klarman (founder & CEO of The Baupost Group, author of 'Margin of Safety')", "host": "Barry Ritholtz", "date": "2026-06-18", "durationMin": null, "worthScore": 5, "worthReason": "极少受访的价值投资传奇复盘四十年方法论：自下而上、安全边际、现金即期权、必须有催化剂；并直指当下 AI/SpaceX 泡沫与资本供需失衡，长青又应景，全文 transcript 可核。", "worthReason_en": "A rarely-interviewed value-investing legend reviews four decades of method — bottom-up, margin of safety, cash as optionality, demand catalysts — and points squarely at today's AI/SpaceX bubble and capital supply-demand imbalance; evergreen yet timely, with a checkable full transcript.", "originalUrl": "https://ritholtz.com/2026/06/mib-seth-klarman/", "transcriptUrl": "https://ritholtz.com/2026/06/transcript-seth-klarman/", "noteFile": "", "status": "done", "tldr": "极少露面的价值投资传奇 Seth Klarman 复盘 Baupost 四十年：从 1982 年的 2700 万美元做到约 220 亿美元，靠自下而上、安全边际、现金即期权与“必须有催化剂”的纪律；并直言当下 AI/SpaceX 狂热“可能是顶部敲响的铃”，资本供需正走向失衡。", "tldr_en": "Rarely-seen value-investing legend Seth Klarman reviews four decades of Baupost — from $27M in 1982 to about $22B — built on bottom-up analysis, margin of safety, cash as optionality and the discipline of 'must have a catalyst'; and warns today's AI/SpaceX frenzy 'may be the bell that rings at the top,' with capital supply-demand tipping out of balance.", "detail": "这是 Masters in Business 一期“极特别嘉宾”访谈：极少露面的 Baupost Group 创始人 Seth Klarman，由 Barry Ritholtz 主持，全文 transcript 公开可核。Klarman 复盘了 Baupost 的起点——1982 年由四个创始家族出资 2700 万美元成立，他 25 岁加入（前约 7 年并非 CEO，后凭与客户的“握手约定”逐渐拿到过半股权，如今已大幅稀释，因为他信奉与团队分享）；四十年后规模约 220 亿美元。他 34 岁写下《Margin of Safety》（1991），仅印约 7000 册、绝版后成“邪典”收藏品，他甚至回购并拿回了版权；2023 年又主编了 Security Analysis 第 7 版。\n方法论是全场最长青的部分：价值投资者“靠待在自下而上里赚钱”，可以有自上而下的天气观（GDP、国债、通胀），但绝不据此配置组合；要“同时持有相互矛盾的想法”——既看到便宜标的，也清楚宏观背景可能危险。他强调安全边际与下行保护：保护好下行、不被margin call、不被赎回逼到“被迫卖出”，才能在最好的机会出现、连最强对手都被迫离场时进场。2008–09 危机里他一个季度募得约 40 亿美元、一度日均部署约 1 亿美元到困境债（住房抵押、GM/Chrysler/Ford 金融臂、Lehman 资本结构碎片），但强调那只是“把每天做的事做大一号”，依旧逐笔 stress-test“如果是 1933 年会怎样”。他还坦承“持现金一度到 30%+ 是个错误”，遂提高公开股票流动性以替代部分现金期权。\n应景的部分极有信息量：他把 AI 称为“sea change（沧海桑田级变化）”，自认非技术派却“读到的一切都读”，但 Baupost 作为价值机构“很难找到做多 AI 的方式”，策略是回避 AI 输家、偶尔捡被市场错杀的“伪 AI 输家”、并以折价买入数据中心等私募资产。对录制前几天的 SpaceX IPO，他受合规限制不评个股，但直言“这是那种可能在顶部敲响的铃”——一家整体不盈利、估值巨大、Goldman 估算某些业务要增长 100 倍才撑得起价格的公司；更大的风险是 SpaceX、OpenAI、Anthropic、公用事业、芯片厂同时抽走天量资本，供需失衡会抬高资本成本、压低价格。他还批评美联储“危机后把零利率多留了十年”，助长投机、抑制责任，催生 2022 年的 meme/SPAC 崩盘；并担忧 AI 可能带来 K 型经济。", "detail_en": "This is a Masters in Business 'extra special guest' interview with the rarely-seen Baupost Group founder Seth Klarman, hosted by Barry Ritholtz, with a public, checkable full transcript. Klarman reviews Baupost's origins — founded in 1982 by four founding families with $27M, which he joined at 25 (he wasn't CEO for about the first seven years, then via a 'handshake deal' with clients gradually got over half the equity, now much diluted because he believes in sharing with his team); four decades later it runs about $22B. At 34 he wrote 'Margin of Safety' (1991), printed only ~7,000 copies, which became a 'cult' collectible after going out of print — he even bought copies back and reclaimed the rights; in 2023 he edited the 7th edition of Security Analysis.\nThe method is the most evergreen part: value investors 'make money staying in the bottom-up,' can hold a top-down weather view (GDP, national debt, inflation) but never allocate the portfolio on it; you must 'hold inconsistent ideas at once' — seeing a cheap name while knowing the macro backdrop may be dangerous. He stresses margin of safety and downside protection: protect the downside, avoid margin calls, avoid redemptions that force you to sell, so you can buy when the best opportunities appear and even your strongest competitors are sidelined. In 2008–09 he raised about $4B in a quarter and at times deployed roughly $100M a day into distressed debt (residential mortgages, the finance arms of GM/Chrysler/Ford, fragments of Lehman's capital structure), but stresses it was just 'doing what we do every day, a little bigger,' still stress-testing each name for 'what if it's 1933.' He candidly admits 'holding 30%+ cash at times was a mistake,' so he made the public equity book more liquid to substitute for some of that cash optionality.\nThe timely part is highly informative: he calls AI a 'sea change,' says he's not a tech guy but 'reads everything I get my hands on,' yet as a value shop Baupost 'won't find too many ways to get long AI,' so the strategy is to avoid AI losers, occasionally pick up mispriced 'fake AI losers,' and buy assets like data centers privately at a discount. On the SpaceX IPO days before recording, compliance bars him from discussing a single security, but he calls it 'the kind of bell that might ring at the top' — an unprofitable company in aggregate, an enormous valuation, with Goldman estimating some business lines would need ~100x growth to justify the price; the bigger risk is SpaceX, OpenAI, Anthropic, utilities and chip makers all vacuuming up vast capital, with supply-demand imbalance raising the cost of capital and softening prices. He also criticizes the Fed for 'keeping zero rates a decade too long' after the crisis, stoking speculation and discouraging responsibility, fueling the 2022 meme/SPAC blowup, and worries AI could bring a K-shaped economy.", "points": ["起家与规模：Baupost 1982 年由四个创始家族出资 2700 万美元成立，Klarman 25 岁加入，四十年后管理约 220 亿美元。", "股权故事：他前约 7 年非 CEO，靠与客户的“握手约定”逐步拿到过半股权，现已大幅稀释，因为信奉与团队分享利益。", "方法论内核：价值投资者“靠待在自下而上里赚钱”，可有自上而下的天气观，但绝不据此配置组合。", "安全边际：保护下行、不被 margin call、不被赎回逼到被迫卖出，才能在对手被迫离场时进场——这是核心优势。", "2008–09 实操：一季度募资约 40 亿美元、一度日均部署约 1 亿美元到困境债，但仍逐笔 stress-test“若是 1933 年会怎样”。", "现金即期权（与教训）：现金提供期权价值，但他坦承“一度持现金到 30%+ 是错误”，遂提高公开股票流动性替代部分现金。", "便宜不是策略：必须问“go-forward 回报”并要有催化剂——便宜可能只是从五年低走向十年低。", "对 AI 的姿态：称 AI 是“sea change”，但价值机构难做多 AI，策略是回避输家、捡被错杀的“伪输家”、折价买数据中心私募。", "SpaceX/泡沫判断：受限不评个股，但直言这是“可能在顶部敲响的铃”；SpaceX/OpenAI/Anthropic/公用事业/芯片同时抽走资本，供需失衡推高资本成本。", "批评美联储：危机后把零利率多留十年，助长投机、抑制责任，埋下 2022 年 meme/SPAC 崩盘，并担忧 AI 造成 K 型经济。"], "points_en": ["Origins and scale: Baupost was founded in 1982 by four founding families with $27M; Klarman joined at 25, and four decades on it manages about $22B.", "Equity story: he wasn't CEO for about the first seven years, gradually getting over half the equity via a 'handshake deal' with clients, now much diluted because he believes in sharing with the team.", "Method core: value investors 'make money staying in the bottom-up,' can hold a top-down weather view but never allocate the portfolio on it.", "Margin of safety: protect the downside, avoid margin calls and forced-selling redemptions, so you can buy when competitors are sidelined — the core edge.", "2008–09 in practice: raised about $4B in a quarter and at times deployed ~$100M a day into distressed debt, still stress-testing each name for 'what if it's 1933.'", "Cash as optionality (and its lesson): cash provides optionality, but he admits 'holding 30%+ cash at times was a mistake,' so he made the public equity book more liquid to substitute for some cash.", "Cheap is not a strategy: you must ask the 'go-forward return' and demand a catalyst — cheap may just go from a five-year low to a ten-year low.", "Stance on AI: he calls AI a 'sea change' but a value shop can hardly get long AI, so the strategy is to avoid losers, pick up mispriced 'fake losers,' and buy data centers privately at a discount.", "SpaceX/bubble call: barred from discussing a single name, he still calls it 'the kind of bell that might ring at the top'; SpaceX/OpenAI/Anthropic/utilities/chips all vacuum up capital, with imbalance raising the cost of capital.", "Critique of the Fed: keeping zero rates a decade too long after the crisis stoked speculation and discouraged responsibility, seeding the 2022 meme/SPAC blowup, and he worries AI could create a K-shaped economy."], "takeaways": ["先想清楚下行：把“别被迫卖出、别爆仓、别被赎回”放在收益之前，活到机会出现的那天才是真本事。", "便宜不够，要有催化剂：买入前问“未来一两年靠什么让它涨”，而不是只盯着历史低位。", "现金是期权但不是免费的：留太多现金在长牛里会很痛——用更高流动性的优质资产替代部分现金期权。", "面对沧海桑田级技术，别假装懂也别盲追：像 Klarman 一样“读到的一切都读”，但只用能算清价值、且不为热度多付钱的方式参与。"], "takeaways_en": ["Think downside first: put 'don't be forced to sell, don't blow up, don't get redeemed' ahead of returns — surviving to the day opportunity appears is the real skill.", "Cheap isn't enough — demand a catalyst: before buying, ask 'what makes it rise in the next year or two,' not just stare at historic lows.", "Cash is optionality but not free: holding too much cash through a long bull market hurts — substitute some of that optionality with high-quality, liquid assets.", "Faced with a sea-change technology, don't fake understanding or chase blindly: like Klarman, 'read everything,' but participate only in ways where you can value it and don't overpay for hype."], "quotes": ["Value investors make money staying in the bottom-up. —— 价值投资者是靠“待在自下而上里”赚钱的。（Seth Klarman）", "Cheap is not really a strategy... we tend to ask that our investments have catalysts. —— 便宜本身算不上策略……我们倾向于要求投资标的必须有催化剂。（Seth Klarman）", "I share your sense that this is the kind of bell that might ring at the top. —— 我同意你的感觉：这（SpaceX IPO）正是那种可能在市场顶部敲响的铃。（Seth Klarman）"], "quotes_en": ["Value investors make money staying in the bottom-up. (Seth Klarman)", "Cheap is not really a strategy... we tend to ask that our investments have catalysts. (Seth Klarman)", "I share your sense that this is the kind of bell that might ring at the top. (Seth Klarman, on the SpaceX IPO)"], "data": ["Baupost 1982 年由四个创始家族出资 2700 万美元成立，现管理约 220 亿美元。", "Klarman 25 岁加入；前约 7 年非 CEO；后持股一度过半，现已大幅稀释（与团队分享）。", "《Margin of Safety》1991 年出版，仅印约 7000 册，绝版后成“邪典”收藏品；2023 年主编 Security Analysis 第 7 版。", "2008–09 危机：一季度募资约 40 亿美元，一度日均部署约 1 亿美元到困境资产。", "他第一只股票约 10 岁买入约 1 股 Johnson & Johnson；现金一度达 30%+，后承认是错误。"], "data_en": ["Baupost was founded in 1982 by four founding families with $27M and now manages about $22B.", "Klarman joined at 25; wasn't CEO for about the first seven years; later held over half the equity, now much diluted (shared with the team).", "'Margin of Safety' (1991) was printed in only ~7,000 copies and became a 'cult' collectible after going out of print; he edited the 7th edition of Security Analysis in 2023.", "2008–09 crisis: raised about $4B in a quarter and at times deployed ~$100M a day into distressed assets.", "His first stock, around age 10, was about one share of Johnson & Johnson; cash reached 30%+ at times, which he later called a mistake."], "note": ""}];

let LANG = "zh";
const t = () => I18N[LANG];
const $=s=>document.querySelector(s);
const WIN_DAYS = 7;
function localToday(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function shiftDays(iso,n){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
const TODAY = localToday();
const WIN_START = shiftDays(TODAY, -(WIN_DAYS-1));
let activeCat="全部", activeShow="全部", query="", sortMode="worth", viewMode="week";

// language-aware field resolver: in EN, use <key>_en if present & non-empty, else fall back to zh
function fld(e,k){if(LANG==="en"){var v=e[k+"_en"];if(v!==undefined&&v!==null&&v!==""&&!(Array.isArray(v)&&v.length===0))return v;}return e[k];}
function stars(n){let h="";for(let i=1;i<=5;i++)h+=i<=n?"★":"<span class='off'>★</span>";return h;}
function dur(m){if(!m)return "";if(m<60)return m+"m";const h=Math.floor(m/60),x=m%60;return h+"h"+(x?x+"m":"");}
function durCN(m){if(!m)return "";if(m<60)return "约"+m+"分钟";const h=Math.floor(m/60),x=m%60;return "约"+h+"小时"+(x?x+"分":"");}
function durLong(m){if(!m)return "";if(LANG==="en"){if(m<60)return m+" min";const h=Math.floor(m/60),x=m%60;return h+"h"+(x?" "+x+"m":"");}return durCN(m);}
function catLabel(c){return c===ALLCAT?t().catAll:(CAT_I18N[c]||c);}
function esc(t){return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inlineMd(t){return esc(t).replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');}
function mdToHtml(md){
  const lines=md.split("\n"); let h="",inList=false;
  const cl=()=>{if(inList){h+="</ul>";inList=false;}};
  for(let raw of lines){const l=raw.trim();
    if(!l){cl();continue;}
    if(l==="---"){cl();h+="<hr>";continue;}
    if(l.startsWith("### ")){cl();h+="<h3>"+inlineMd(l.slice(4))+"</h3>";continue;}
    if(l.startsWith("## ")){cl();h+="<h2>"+inlineMd(l.slice(3))+"</h2>";continue;}
    if(l.startsWith("# ")){cl();h+="<h1>"+inlineMd(l.slice(2))+"</h1>";continue;}
    if(l.startsWith("- ")){if(!inList){h+="<ul>";inList=true;}h+="<li>"+inlineMd(l.slice(2))+"</li>";continue;}
    cl();h+="<p>"+inlineMd(l)+"</p>";}
  cl();return h;
}
function listenLinks(e){
  const d=t();
  const o=e.originalUrl||"";
  const tq=encodeURIComponent((e.title||"")+" "+(e.podcast||""));
  const isY=/youtube\.com|youtu\.be/.test(o), isA=/podcasts\.apple/.test(o), isS=/open\.spotify|spotify\.com/.test(o);
  const matched=isY||isA||isS;
  let b=[];
  if(!matched&&o) b.push('<a class="btn" href="'+o+'" target="_blank" rel="noopener">'+d.btnOrig+'</a>');
  b.push('<a class="btn yt" href="'+(isY?o:'https://www.youtube.com/results?search_query='+tq)+'" target="_blank" rel="noopener">'+d.btnYT+'</a>');
  b.push('<a class="btn" href="'+(isA?o:'https://podcasts.apple.com/us/search?term='+tq)+'" target="_blank" rel="noopener">'+d.btnApple+'</a>');
  b.push('<a class="btn" href="'+(isS?o:'https://open.spotify.com/search/'+tq)+'" target="_blank" rel="noopener">'+d.btnSpotify+'</a>');
  b.push(e.transcriptUrl?'<a class="btn primary" href="'+e.transcriptUrl+'" target="_blank" rel="noopener">'+d.btnTranscript+'</a>':'<button class="btn" disabled>'+d.btnTranscript+'</button>');
  const note='<div class="tnote">'+(e.transcriptUrl?d.tnoteYes:d.tnoteNo)+'</div>';
  return '<div class="mlinks">'+b.join("")+'</div>'+note;
}
function structured(e){
  const d=t(); let h="";
  h+='<div class="worth"><span class="st">'+stars(e.worthScore)+'</span> '+d.secWorth(e.worthScore)+esc(fld(e,'worthReason'))+'</div>';
  h+='<div class="msec blue"><h4>'+d.secTldr+'</h4><div class="tldrbox">'+esc(fld(e,'tldr'))+'</div></div>';
  var det=fld(e,'detail');
  if(det){h+='<div class="msec blue"><h4>'+d.secDetail+'</h4>'+det.split(/\n+/).map(s=>s.trim()).filter(Boolean).map(p=>'<p style="font-size:13.5px;color:#2b3850;margin:9px 0;line-height:1.72">'+inlineMd(p)+'</p>').join("")+'</div>';}
  var pts=fld(e,'points');
  if(pts&&pts.length){h+='<div class="msec blue"><h4>'+d.secPoints+'</h4><ul>'+pts.map(p=>"<li>"+inlineMd(p)+"</li>").join("")+'</ul></div>';}
  var dta=fld(e,'data');
  if(dta&&dta.length){h+='<div class="msec blue"><h4>'+d.secData+'</h4><ul>'+dta.map(p=>"<li>"+inlineMd(p)+"</li>").join("")+'</ul></div>';}
  var tk=fld(e,'takeaways');
  if(tk&&tk.length){h+='<div class="msec green"><h4>'+d.secTake+'</h4><div class="greenbox"><ul>'+tk.map(p=>"<li>"+inlineMd(p)+"</li>").join("")+'</ul></div></div>';}
  var qt=fld(e,'quotes');
  if(qt&&qt.length){h+='<div class="msec gold"><h4>'+d.secQuotes+'</h4>'+qt.map(q=>'<div class="qbox">'+inlineMd(q)+'</div>').join("")+'</div>';}
  if(e.note){h+='<div class="msec note"><h4>'+d.secNote+'</h4><div class="md">'+mdToHtml(e.note)+'</div></div>';}
  return h;
}
function openModal(id){
  const e=EPISODES.find(x=>x.id===id);
  $("#mtitle").innerHTML='<span class="pod">'+e.podcast+'</span> · '+e.date+(e.durationMin?" · "+durLong(e.durationMin):"")+' · <span class="stars" style="margin:0">'+stars(e.worthScore)+'</span> · Tier '+e.tier;
  $("#mbody").innerHTML='<h2 style="font-size:18px;margin-bottom:5px;line-height:1.4">'+esc(e.title)+'</h2><div class="gl">🎙 '+esc(fld(e,'guest'))+'</div>'+listenLinks(e)+structured(e);
  $("#overlay").classList.add("open");document.body.style.overflow="hidden";$(".modal").scrollTop=0;
}
function closeModal(){$("#overlay").classList.remove("open");document.body.style.overflow="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

function toggleSort(){sortMode=sortMode==="worth"?"date":"worth";$("#sortBtn").textContent=sortMode==="worth"?t().sortWorth:t().sortDate;render();}
function toggleView(){viewMode=viewMode==="week"?"all":"week";$("#viewBtn").textContent=viewMode==="week"?t().week:t().all;render();}
function toggleLang(){LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("pt_lang",LANG);}catch(e){}applyI18n();render();}

function expHint(e){
  const d=t();
  const meta=(fld(e,'detail')?d.expDetail+" · ":"")+((fld(e,'points')||[]).length)+d.expPoints+" · "+((fld(e,'takeaways')||[]).length)+d.expTake+" · "+((fld(e,'quotes')||[]).length)+d.expQuotes+(e.note?" · "+d.expNote:"");
  return d.expand(meta);
}

function hlList(){
  const en = (LANG==="en" && META.highlights_en && META.highlights_en.length);
  const arr = en ? META.highlights_en : (META.highlights||[]);
  return arr.map(h=>{
    var i=h.indexOf("："), sep="：";
    if(i<0){i=h.indexOf(": "); sep=": ";}
    return "<li>"+(i>0?"<b>"+inlineMd(h.slice(0,i))+"</b>"+sep+inlineMd(h.slice(i+sep.length)):inlineMd(h))+"</li>";
  }).join("");
}

function applyI18n(){
  const d=t();
  document.documentElement.lang=d.htmlLang;
  document.title=LANG==="zh"?"顶尖播客追踪":"Top Podcast Tracker";
  $("#brandTitle").textContent=d.title;
  $("#brandSub").textContent=d.sub;
  $("#langBtn").textContent=d.langBtn;
  $("#hlHead").textContent=d.hlHead;
  $("#q").placeholder=d.search;
  $("#viewBtn").textContent=viewMode==="week"?d.week:d.all;
  $("#sortBtn").textContent=sortMode==="worth"?d.sortWorth:d.sortDate;
  $("#footer").innerHTML=d.footer;
  $("#langnote").innerHTML=d.note||"";
  $("#langnote").style.display=d.note?"block":"none";
  $("#hlList").innerHTML=hlList();
}

function render(){
  const d=t();
  const CN=(LANG==="en"&&META.checkNote_en)?META.checkNote_en:META.checkNote;
  const cats=["全部",...new Set(EPISODES.map(e=>e.category))];
  $("#catFilters").innerHTML=cats.map(c=>{
    const col=CATCOLORS[c]?'<span class="dot" style="background:'+CATCOLORS[c]+'"></span>':"";
    return '<button class="fbtn '+(c===activeCat?'on':'')+'" onclick="setCat(\''+c+'\')">'+col+catLabel(c)+'</button>';}).join("");
  const shows=[...new Set(EPISODES.map(e=>e.podcast))].sort();
  $("#showSel").innerHTML='<option value="全部">'+d.allShows(shows.length)+'</option>'+shows.map(s=>'<option value="'+s+'" '+(s===activeShow?'selected':'')+'>'+s+'</option>').join("");

  let list=EPISODES.filter(e=>(activeCat==="全部"||e.category===activeCat)&&(activeShow==="全部"||e.podcast===activeShow));
  if(viewMode==="week") list=list.filter(e=>e.date>=WIN_START);
  if(query){const q=query.toLowerCase();list=list.filter(e=>(e.title+e.podcast+e.guest+e.host+e.tldr+e.category+(e.points||[]).join("")+(e.detail||"")+(e.tldr_en||"")+(e.detail_en||"")+(e.guest_en||"")+(e.points_en||[]).join("")).toLowerCase().includes(q));}
  if(sortMode==="worth")list.sort((a,b)=>b.worthScore-a.worthScore||b.date.localeCompare(a.date));
  else list.sort((a,b)=>b.date.localeCompare(a.date)||b.worthScore-a.worthScore);

  $("#grid").innerHTML=list.map(e=>`
    <div class="card" onclick="openModal('${e.id}')">
      <div class="row">
        <span class="tier ${e.tier}">${e.tier}</span>
        <span class="pod">${e.podcast}</span>
        <span class="meta-s">${e.date}${e.durationMin?" · "+dur(e.durationMin):""}</span>
        <span class="stars" title="${esc(d.secWorth(e.worthScore))}">${stars(e.worthScore)}</span>
      </div>
      <h3>${esc(e.title)}</h3>
      <div class="gl">🎙 ${esc(fld(e,'guest'))}</div>
      <div class="tldr">${esc(fld(e,'tldr'))}</div>
      <div class="exp">${expHint(e)}</div>
      <div class="acts" onclick="event.stopPropagation()">
        <a class="btn" href="${e.originalUrl}" target="_blank" rel="noopener">${d.btnOrig}</a>
        ${e.transcriptUrl?`<a class="btn" href="${e.transcriptUrl}" target="_blank" rel="noopener">${d.btnTranscript}</a>`:`<button class="btn" disabled>${d.btnTranscript}</button>`}
      </div>
    </div>`).join("");

  const wk=EPISODES.filter(e=>e.date>=WIN_START).length;
  $("#empty").style.display=list.length?"none":"block";
  $("#empty").textContent=viewMode==="week"?d.emptyWeek:d.emptyAll;
  const hb=CN?' · <span style="color:#2f5bea">🛰 '+inlineMd(CN)+'</span>':'';
  if(viewMode==="week"){
    $("#winbar").innerHTML=d.winWeek(WIN_START,TODAY,META.lastUpdated,wk,EPISODES.length)+hb;
  }else{
    $("#winbar").innerHTML=d.winAll(META.lastUpdated,EPISODES.length)+hb;
  }
  const shownShows=new Set(list.map(e=>e.podcast)).size;
  const s5=list.filter(e=>e.worthScore>=5).length;
  const ccount=new Set(list.map(e=>e.category)).size;
  $("#stats").innerHTML=
    '<div class="stat"><b>'+list.length+'</b>'+(viewMode==="week"?d.statWeek:d.statShown)+'</div>'+
    '<div class="stat"><b>'+shownShows+'</b>'+d.statShows+'</div>'+
    '<div class="stat"><b>'+s5+'</b>'+d.stat5+'</div>'+
    '<div class="stat"><b>'+ccount+'</b>'+d.statTopics+'</div>';
}
function setCat(c){activeCat=c;render();}
$("#showSel").addEventListener("change",e=>{activeShow=e.target.value;render();});
$("#q").addEventListener("input",e=>{query=e.target.value;render();});

try{const sv=localStorage.getItem("pt_lang");if(sv==="en"||sv==="zh")LANG=sv;}catch(e){}
applyI18n();
render();
</script>
</body>
</html>
